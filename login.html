<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Superstars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold:  #FFD700; --gold2: #FFA500;
    --dark:  #0A0A0F; --dark2: #12121A; --dark3: #1C1C28;
    --border: rgba(255,215,0,0.15);
    --text:  #F0F0F5; --muted: #888899;
    --error: #EF4444; --success: #10B981;
    --radius: 16px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body:    'DM Sans', sans-serif;
  }
  body {
    font-family: var(--font-body);
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; opacity: 0.35;
  }
  .orb-1 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(255,215,0,0.25), transparent);
    top: -80px; left: -80px;
    animation: float 9s ease-in-out infinite;
  }
  .orb-2 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(255,100,0,0.2), transparent);
    bottom: -60px; right: -60px;
    animation: float 11s ease-in-out infinite reverse;
  }
  @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }

  .card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px;
    width: 100%; max-width: 420px;
    position: relative;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    animation: slideUp .4s ease;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .logo {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 100px;
    padding: 5px 14px; margin-bottom: 10px;
  }
  .logo-badge span { font-size: 11px; color: var(--gold); letter-spacing: .1em; text-transform: uppercase; font-weight: 600; }
  .logo h1 {
    font-family: var(--font-display);
    font-size: 52px; letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold), var(--gold2), #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .logo p { font-size: 13px; color: var(--muted); margin-top: 6px; }

  /* Panel switcher */
  .panel { display: none; animation: fadeUp .3s ease; }
  .panel.active { display: block; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 11px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  input[type="text"],
  input[type="email"],
  input[type="number"] {
    width: 100%;
    background: var(--dark3);
    border: 1.5px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
    letter-spacing: 1px;
  }
  input:focus {
    border-color: rgba(255,215,0,0.4);
    box-shadow: 0 0 0 3px rgba(255,215,0,0.07);
  }

  /* Code input special */
  .code-input {
    text-align: center;
    font-size: 24px !important;
    letter-spacing: 6px !important;
    font-weight: 600 !important;
  }

  .btn {
    width: 100%; padding: 16px;
    border-radius: var(--radius);
    border: none;
    font-family: var(--font-display);
    font-size: 20px; letter-spacing: 2px;
    cursor: pointer;
    transition: all .2s;
    position: relative; overflow: hidden;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--dark);
  }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,215,0,0.3); }
  .btn-gold:active { transform: translateY(0); }
  .btn-gold::after {
    content: ''; position: absolute;
    top:0; left:-100%; width:60%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: skewX(-20deg); transition: left .5s;
  }
  .btn-gold:hover::after { left: 150%; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 14px; letter-spacing: 0;
    margin-top: 10px;
  }
  .btn-ghost:hover { border-color: rgba(255,215,0,0.3); color: var(--text); }

  .forgot-link {
    text-align: center; margin-top: 16px;
    font-size: 13px; color: var(--muted);
  }
  .forgot-link a {
    color: var(--gold); text-decoration: none; font-weight: 600;
  }

  .signup-link {
    text-align: center; font-size: 13px;
    color: var(--muted); margin-top: 20px;
  }
  .signup-link a { color: var(--gold); text-decoration: none; font-weight: 600; }

  /* Recovery success */
  .recovery-note {
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 13px;
    color: #6EE7B7;
    text-align: center;
    margin-top: 16px;
    display: none;
  }

  /* Admin link */
  .admin-hint {
    text-align: center;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .admin-hint a {
    font-size: 12px; color: var(--muted);
    text-decoration: none;
    transition: color .2s;
  }
  .admin-hint a:hover { color: var(--gold); }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .logo h1 { font-size: 44px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">

  <div class="logo">
    <div class="logo-badge"><span>⭐ EYC Empire</span></div>
    <h1>SUPERSTARS</h1>
    <p>Log in to continue your journey</p>
  </div>

  <!-- LOGIN PANEL -->
  <div class="panel active" id="panelLogin">
    <div class="form-group">
      <label>Your Code</label>
      <input type="number" id="loginCode" class="code-input" placeholder="123456" maxlength="6">
    </div>
    <div class="form-group">
      <label>Your Passkey</label>
      <input type="text" id="loginPasskey" placeholder="Enter your passkey" maxlength="8"
             style="letter-spacing:3px;font-size:18px;text-align:center;"
             onkeydown="if(event.key==='Enter') loginNow()">
    </div>
    <button class="btn btn-gold" id="loginBtn" onclick="loginNow()">LOG IN →</button>
    <div class="forgot-link">
      Forgot your credentials? <a href="#" onclick="showPanel('panelRecover');return false;">Recover via email</a>
    </div>
    <div class="signup-link">
      New here? <a href="signup.html">Create an account</a>
    </div>
  </div>

  <!-- RECOVER PANEL -->
  <div class="panel" id="panelRecover">
    <div class="form-group">
      <label>Your Google Email</label>
      <input type="email" id="recoverEmail" placeholder="your@gmail.com">
    </div>
    <button class="btn btn-gold" onclick="recoverNow()">SEND CREDENTIALS</button>
    <button class="btn btn-ghost" onclick="showPanel('panelLogin')">← BACK TO LOGIN</button>
    <div class="recovery-note" id="recoveryNote">
      ✅ Your credentials have been sent to your email. Check your inbox!
    </div>
  </div>

  <!-- Admin hint -->
  <div class="admin-hint">
    <a href="admin.html">Admin Panel →</a>
  </div>

</div>

<script>
  // Redirect if already logged in
  if (Auth.get()) window.location.href = CONFIG.PAGES.DASHBOARD;

  function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  async function loginNow() {
    const code    = document.getElementById("loginCode").value.trim();
    const passkey = document.getElementById("loginPasskey").value.trim();

    if (!code)    return UI.toast("Please enter your code.", "error");
    if (!passkey) return UI.toast("Please enter your passkey.", "error");

    const btn = document.getElementById("loginBtn");
    btn.disabled = true;
    btn.textContent = "LOGGING IN...";
    UI.loader(true, "Verifying credentials...");

    const result = await api("login", { code, passkey });

    UI.loader(false);
    btn.disabled = false;
    btn.textContent = "LOG IN →";

    if (!result.success) {
      return UI.toast(result.error || "Login failed. Check your code and passkey.", "error");
    }

    Auth.save(result.student);
    UI.toast("Welcome back, " + result.student.full_name + "! 🔥", "success");
    setTimeout(() => window.location.href = CONFIG.PAGES.DASHBOARD, 800);
  }

  async function recoverNow() {
    const email = document.getElementById("recoverEmail").value.trim();
    if (!email || !email.includes("@")) return UI.toast("Please enter a valid email.", "error");

    UI.loader(true, "Sending credentials...");
    const result = await api("recover_credentials", { email });
    UI.loader(false);

    if (!result.success) {
      return UI.toast(result.error || "Email not found.", "error");
    }

    document.getElementById("recoveryNote").style.display = "block";
    UI.toast("Credentials sent! Check your inbox.", "success");
  }
</script>
</body>
</html>
