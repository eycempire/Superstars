<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Superstars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<script src="config.js"></script>
<style>
body {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px 16px; position: relative;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(56,189,248,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.025) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none;
}
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(90px); pointer-events: none; opacity: .35;
}
.orb-1 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, rgba(56,189,248,0.25), transparent);
  top: -80px; left: -80px;
  animation: float 9s ease-in-out infinite;
}
.orb-2 {
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(167,139,250,0.2), transparent);
  bottom: -60px; right: -60px;
  animation: float 11s ease-in-out infinite reverse;
}
@keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }

.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 24px; padding: 40px 36px;
  width: 100%; max-width: 420px;
  position: relative; box-shadow: var(--shadow-lg);
  animation: fadeUp .4s ease;
}
.card::before {
  content: ''; position: absolute; top:0; left:10%; right:10%; height:2px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  border-radius: 2px;
}

.logo { text-align: center; margin-bottom: 36px; }
.logo-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--blue-dim); border: 1px solid var(--blue-border);
  border-radius: var(--radius-full); padding: 5px 14px; margin-bottom: 10px;
}
.logo-badge span { font-size: 11px; color: var(--blue); letter-spacing: .1em; text-transform: uppercase; font-weight: 600; }
.logo h1 {
  font-family: var(--font-display); font-size: 52px; letter-spacing: 4px;
  color: var(--text-primary); line-height: 1; margin-bottom: 6px;
}
.logo h1 .acc { color: var(--blue); }
.logo p { font-size: 13px; color: var(--text-muted); }

.panel { display: none; animation: fadeUp .3s ease; }
.panel.active { display: block; }

.form-group { margin-bottom: 18px; }
label {
  display: block; font-size: 11px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 8px;
}
.field-input {
  width: 100%; background: var(--bg-overlay);
  border: 1.5px solid var(--border-subtle);
  border-radius: var(--radius-sm); padding: 13px 16px;
  color: var(--text-primary); font-family: var(--font-body);
  font-size: 15px; outline: none;
  transition: var(--transition-fast); -webkit-appearance: none;
}
.field-input:focus {
  border-color: var(--blue-border);
  box-shadow: 0 0 0 3px var(--blue-dim);
}
.code-input {
  text-align: center; font-size: 24px !important;
  letter-spacing: 6px !important; font-weight: 600 !important;
  font-family: var(--font-mono) !important;
}

.btn-submit {
  width: 100%; padding: 15px;
  background: var(--blue); color: #0D1117;
  border: none; border-radius: var(--radius-md);
  font-family: var(--font-display); font-size: 20px; letter-spacing: 2px;
  cursor: pointer; transition: var(--transition-base);
  position: relative; overflow: hidden;
}
.btn-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: var(--shadow-blue); }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; }
.btn-submit::after {
  content: ''; position: absolute; top:0; left:-100%; width:60%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: skewX(-20deg); transition: left .5s;
}
.btn-submit:hover:not(:disabled)::after { left: 150%; }

.btn-back {
  width: 100%; padding: 13px; background: transparent;
  border: 1.5px solid var(--border-subtle);
  border-radius: var(--radius-md); color: var(--text-muted);
  font-family: var(--font-body); font-size: 14px;
  cursor: pointer; transition: var(--transition-fast); margin-top: 10px;
}
.btn-back:hover { border-color: var(--border-default); color: var(--text-primary); }

.forgot-link {
  text-align: center; margin-top: 16px;
  font-size: 13px; color: var(--text-muted);
}
.forgot-link a { color: var(--blue); text-decoration: none; font-weight: 600; }

.signup-link {
  text-align: center; font-size: 13px;
  color: var(--text-muted); margin-top: 20px;
}
.signup-link a { color: var(--blue); text-decoration: none; font-weight: 600; }

.recovery-note {
  background: var(--green-dim); border: 1px solid var(--green-border);
  border-radius: var(--radius-sm); padding: 12px 16px;
  font-size: 13px; color: var(--green); text-align: center;
  margin-top: 14px; display: none;
}

.admin-hint {
  text-align: center; margin-top: 24px; padding-top: 20px;
  border-top: 1px solid var(--border-subtle);
}
.admin-hint a {
  font-size: 12px; color: var(--text-muted);
  text-decoration: none; transition: color .2s;
}
.admin-hint a:hover { color: var(--blue); }

@media (max-width: 480px) {
  .card { padding: 28px 20px; }
  .logo h1 { font-size: 44px; }
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-badge"><span>⭐ EYC Empire</span></div>
    <h1>SUPER<span class="acc">STARS</span></h1>
    <p>Log in to continue your journey</p>
  </div>

  <!-- LOGIN -->
  <div class="panel active" id="panelLogin">
    <div class="form-group">
      <label>Your Code</label>
      <input type="number" class="field-input code-input" id="loginCode" placeholder="123456" maxlength="6">
    </div>
    <div class="form-group">
      <label>Your Passkey</label>
      <input type="text" class="field-input" id="loginPasskey"
        placeholder="Enter your passkey"
        style="letter-spacing:3px;font-size:18px;text-align:center;"
        onkeydown="if(event.key==='Enter') loginNow()">
    </div>
    <button class="btn-submit" id="loginBtn" onclick="loginNow()">LOG IN →</button>
    <div class="forgot-link">
      Forgot your credentials? <a href="#" onclick="showPanel('panelRecover');return false;">Recover via email</a>
    </div>
    <div class="signup-link">
      New here? <a href="signup.html">Create an account</a>
    </div>
  </div>

  <!-- RECOVER -->
  <div class="panel" id="panelRecover">
    <div class="form-group">
      <label>Your Google Email</label>
      <input type="email" class="field-input" id="recoverEmail" placeholder="your@gmail.com">
    </div>
    <button class="btn-submit" onclick="recoverNow()">SEND CREDENTIALS</button>
    <button class="btn-back" onclick="showPanel('panelLogin')">← BACK TO LOGIN</button>
    <div class="recovery-note" id="recoveryNote">
      ✅ Your credentials have been sent to your email. Check your inbox!
    </div>
  </div>

  <div class="admin-hint">
    <a href="admin.html">Admin Panel →</a>
  </div>
</div>

<script>
if (Auth.get()) window.location.href = CONFIG.PAGES.DASHBOARD;

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function loginNow() {
  const code    = document.getElementById('loginCode').value.trim();
  const passkey = document.getElementById('loginPasskey').value.trim();
  if (!code)    return UI.toast('Please enter your code.', 'error');
  if (!passkey) return UI.toast('Please enter your passkey.', 'error');

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'LOGGING IN...';
  UI.loader(true, 'Verifying credentials...');

  const result = await api('login', { code, passkey });

  UI.loader(false);
  btn.disabled = false; btn.textContent = 'LOG IN →';

  if (!result.success) return UI.toast(result.error || 'Login failed. Check your code and passkey.', 'error');

  Auth.save(result.student);
  UI.toast('Welcome back, ' + result.student.full_name + '! 🔥', 'success');
  setTimeout(() => window.location.href = CONFIG.PAGES.DASHBOARD, 800);
}

async function recoverNow() {
  const email = document.getElementById('recoverEmail').value.trim();
  if (!email || !email.includes('@')) return UI.toast('Please enter a valid email.', 'error');

  UI.loader(true, 'Sending credentials...');
  const result = await api('recover_credentials', { email });
  UI.loader(false);

  if (!result.success) return UI.toast(result.error || 'Email not found.', 'error');
  document.getElementById('recoveryNote').style.display = 'block';
  UI.toast('Credentials sent! Check your inbox.', 'success');
}
</script>
</body>
</html>
