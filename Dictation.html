<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dictation Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#FFD700; --gold2:#FFA500; --dark:#0F0F1A; --dark2:#181825; --dark3:#222235;
  --border:rgba(255,215,0,0.12); --border2:rgba(255,255,255,0.07);
  --text:#EEEEF5; --muted:#7777AA; --muted2:#AAAACC; --success:#10B981; --error:#EF4444;
  --font-b:'Syne',sans-serif; --font-mono:'JetBrains Mono',monospace; --radius:14px;
}
body { font-family:var(--font-b); background:var(--dark); color:var(--text); padding:16px 14px 32px; }

/* Audio Player */
.audio-section {
  background:var(--dark2); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px; margin-bottom:20px;
  text-align:center; position:relative; overflow:hidden;
}
.audio-section::before { content:''; position:absolute; top:0; left:10%; right:10%; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.audio-icon { font-size:40px; margin-bottom:10px; display:block; }
.audio-title { font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.audio-player { width:100%; height:44px; border-radius:22px; outline:none; accent-color:var(--gold); }
.audio-warning { font-size:11px; color:#FCD34D; margin-top:10px; background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2); border-radius:8px; padding:8px 12px; }

/* Steps */
.steps { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.step {
  display:flex; align-items:flex-start; gap:12px;
  background:var(--dark2); border:1px solid var(--border2);
  border-radius:var(--radius); padding:14px;
  transition:border-color .2s;
}
.step.done { border-color:rgba(16,185,129,0.25); }
.step-num {
  width:28px; height:28px; border-radius:50%;
  background:var(--dark3); border:1.5px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:800; color:var(--muted);
  flex-shrink:0; transition:all .2s;
}
.step.done .step-num { background:rgba(16,185,129,0.1); border-color:rgba(16,185,129,0.3); color:#6EE7B7; }
.step-body { flex:1; }
.step-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:4px; }
.step-desc  { font-size:12px; color:var(--muted); line-height:1.5; }

/* Upload area */
.upload-area {
  background:var(--dark2); border:2px dashed var(--border2);
  border-radius:var(--radius); padding:28px 20px;
  text-align:center; cursor:pointer;
  transition:all .2s; margin-bottom:16px;
}
.upload-area:hover { border-color:rgba(255,215,0,0.3); background:rgba(255,215,0,0.03); }
.upload-area.has-file { border-color:rgba(16,185,129,0.3); background:rgba(16,185,129,0.04); border-style:solid; }
.upload-icon { font-size:36px; margin-bottom:10px; display:block; }
.upload-text { font-size:13px; color:var(--muted2); margin-bottom:6px; }
.upload-sub  { font-size:11px; color:var(--muted); }
.upload-input { display:none; }

/* Preview */
.photo-preview {
  width:100%; max-height:250px; object-fit:contain;
  border-radius:var(--radius); border:1px solid var(--border2);
  display:none; margin-bottom:12px; background:var(--dark2);
}

/* Buttons */
.change-btn {
  display:block; width:100%; padding:10px;
  background:transparent; border:1px solid var(--border2);
  border-radius:var(--radius); color:var(--muted);
  font-family:var(--font-b); font-size:13px; font-weight:600;
  cursor:pointer; transition:all .2s; margin-bottom:12px;
  text-align:center;
}
.change-btn:hover { border-color:var(--border); color:var(--text); }

/* Upload progress */
.upload-progress { display:none; margin-bottom:12px; }
.up-track { height:4px; background:var(--dark3); border-radius:100px; overflow:hidden; }
.up-fill  { height:100%; width:0%; border-radius:100px; background:linear-gradient(90deg,var(--gold),var(--gold2)); transition:width .3s; }
.up-label { font-size:11px; color:var(--muted); text-align:center; margin-top:6px; }

.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,215,0,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading task...</div></div></div>
<script src="../config.js"></script>
<script>
const params     = new URLSearchParams(window.location.search);
const taskNumber = parseInt(params.get('task')) || 1;
const studentId  = params.get('student') || '';

let taskData   = null;
let photoFile  = null;
let photoB64   = null;
let step1Done  = false;

window.addEventListener('DOMContentLoaded', async () => {
  const result = await api('get_task_data', {
    student_id: studentId, activity_name: 'Dictation', task_number: taskNumber
  });
  if (!result.success || !result.task) { showError('Could not load task.'); return; }
  taskData = result.task;
  render();
});

function render() {
  document.getElementById('root').innerHTML = `
    <!-- Audio -->
    <div class="audio-section">
      <span class="audio-icon">✍️</span>
      <div class="audio-title">Dictation · Task ${taskNumber} · Listen & Write</div>
      ${taskData.Audio_Path
        ? `<audio class="audio-player" controls src="${taskData.Audio_Path}" onpause="markStep1()"></audio>`
        : `<div style="color:var(--muted);font-size:13px">Audio will appear here</div>`}
      <div class="audio-warning">⚠️ You can PAUSE only — no rewind or fast-forward allowed.</div>
    </div>

    <!-- Steps -->
    <div class="steps">
      <div class="step ${step1Done?'done':''}" id="step1">
        <div class="step-num">${step1Done?'✓':'1'}</div>
        <div class="step-body">
          <div class="step-title">Listen to the audio</div>
          <div class="step-desc">Press play and listen carefully. You can pause but not rewind.</div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-title">Write by hand on paper</div>
          <div class="step-desc">Write exactly what you hear. Write clearly. No crossing out words.</div>
        </div>
      </div>
      <div class="step ${photoB64?'done':''}">
        <div class="step-num">${photoB64?'✓':'3'}</div>
        <div class="step-body">
          <div class="step-title">Take a clear photo & upload</div>
          <div class="step-desc">Make sure the photo is well-lit and handwriting is clear.</div>
        </div>
      </div>
    </div>

    <!-- Photo preview -->
    <img id="photoPreview" class="photo-preview" alt="Your handwriting" ${photoB64?`src="${photoB64}" style="display:block"`:''}>

    <!-- Upload area -->
    <div class="upload-area ${photoB64?'has-file':''}" onclick="document.getElementById('fileInput').click()" id="uploadArea">
      <input type="file" id="fileInput" class="upload-input" accept="image/*" onchange="handleFile(this)">
      <span class="upload-icon">${photoB64?'✅':'📸'}</span>
      <div class="upload-text">${photoB64?'Photo uploaded! Tap to change.':'Tap to take or upload a photo'}</div>
      <div class="upload-sub">${photoB64?'':'Camera or gallery — JPG, PNG, up to 10MB'}</div>
    </div>

    ${photoB64?`<button class="change-btn" onclick="document.getElementById('fileInput').click()">📷 Change Photo</button>`:''}

    <div class="upload-progress" id="uploadProgress">
      <div class="up-track"><div class="up-fill" id="upFill"></div></div>
      <div class="up-label" id="upLabel">Processing...</div>
    </div>
  `;
}

function markStep1() {
  step1Done = true;
  render();
}

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    alert('Photo must be under 10MB. Please try again.');
    return;
  }
  photoFile = file;

  // Show progress
  document.getElementById('uploadProgress').style.display = 'block';
  let progress = 0;
  const timer = setInterval(() => {
    progress += 10;
    document.getElementById('upFill').style.width = progress + '%';
    document.getElementById('upLabel').textContent = 'Processing... ' + progress + '%';
    if (progress >= 90) clearInterval(timer);
  }, 80);

  const reader = new FileReader();
  reader.onload = e => {
    photoB64 = e.target.result;
    clearInterval(timer);
    document.getElementById('upFill').style.width = '100%';
    document.getElementById('upLabel').textContent = '✅ Photo ready!';
    setTimeout(render, 600);
  };
  reader.readAsDataURL(file);
}

// Exposed to parent
window.getSubmitPayload = function() {
  if (!photoB64) throw new Error('Please upload a photo of your handwriting first.');
  return {
    photo_drive_url: photoB64, // In production: upload to Drive first, return URL
    task_number:     taskNumber
  };
};

window.getAnswers = function() { return window.getSubmitPayload(); };

function showError(msg) {
  document.getElementById('root').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;
}
</script>
</body>
</html>
