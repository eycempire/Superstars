<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"><title>Alike X</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="../config.js"></script>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--gold:#FFD700;--purple:#A855F7;--dark:#0F0F1A;--dark2:#181825;--dark3:#222235;--border2:rgba(255,255,255,0.07);--text:#EEEEF5;--muted:#7777AA;--muted2:#AAAACC;--success:#10B981;--error:#EF4444;--font-b:'Syne',sans-serif;--radius:14px}body{font-family:var(--font-b);background:var(--dark);color:var(--text);padding:16px 14px 32px}.x-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);border-radius:100px;padding:5px 14px;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#D8B4FE;margin-bottom:14px}.q-card{background:var(--dark2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:16px;margin-bottom:12px}.q-num{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}.audio-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:var(--dark3);border-radius:10px;padding:10px 14px}.audio-row audio{flex:1;height:36px;outline:none;accent-color:var(--purple)}.audio-row .note{font-size:10px;color:var(--muted);white-space:nowrap}.choices{display:grid;grid-template-columns:1fr 1fr;gap:7px}.choice-btn{padding:10px 12px;background:var(--dark3);border:1.5px solid var(--border2);border-radius:8px;font-family:var(--font-b);font-size:12px;font-weight:600;color:var(--muted2);cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:7px}.choice-btn:hover:not(.answered){border-color:rgba(168,85,247,0.35);color:var(--text)}.choice-btn.selected{border-color:var(--purple);background:rgba(168,85,247,0.08);color:#D8B4FE}.choice-btn.correct{border-color:var(--success);background:rgba(16,185,129,0.08);color:#6EE7B7}.choice-btn.wrong{border-color:var(--error);background:rgba(239,68,68,0.08);color:#FCA5A5}.choice-btn.dim{opacity:.4;pointer-events:none}.cl{width:20px;height:20px;border-radius:50%;background:var(--dark2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}.choice-btn.correct .cl{background:var(--success);color:#fff}.choice-btn.wrong .cl{background:var(--error);color:#fff}.choice-btn.selected .cl{background:var(--purple);color:#fff}.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px}.spinner{width:36px;height:36px;border:3px solid rgba(168,85,247,0.2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-text{font-size:13px;color:var(--muted)}</style></head>
<body><div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading task...</div></div></div>
<script>
const params=new URLSearchParams(window.location.search);
const taskNumber=parseInt(params.get('task'))||1;
const studentId=params.get('student')||'';
let taskData=null,questions=[],answers=[],answered=[];
const LETTERS=['A','B','C','D'];
window.addEventListener('DOMContentLoaded',async()=>{
  const r=await api('get_task_data',{student_id:studentId,activity_name:'AlikeX',task_number:taskNumber});
  if(!r.success||!r.task){showError('Could not load task.');return;}
  taskData=r.task;buildQuestions();render();
});
function buildQuestions(){
  for(let i=1;i<=10;i++){
    const correct=taskData['Audio_'+i+'_Answer']||'';
    const audioPath=taskData['Audio_'+i+'_Path']||'';
    if(!correct)continue;
    questions.push({audioPath,correct,choices:shuffle([{text:correct,correct:true},{text:taskData[`Q${i}_Wrong_A`]||'option b',correct:false},{text:taskData[`Q${i}_Wrong_B`]||'option c',correct:false},{text:taskData[`Q${i}_Wrong_C`]||'option d',correct:false}])});
  }
  answers=new Array(questions.length).fill(null);
  answered=new Array(questions.length).fill(false);
}
function shuffle(arr){return arr.map(v=>({v,s:Math.random()})).sort((a,b)=>a.s-b.s).map(({v})=>v);}
function render(){
  document.getElementById('root').innerHTML=`
    <div class="x-badge">✨ Alike X · Task ${taskNumber}</div>
    ${questions.map((q,i)=>{
      const isDone=answered[i],sel=answers[i];
      return`<div class="q-card" id="qc-${i}">
        <div class="q-num">Audio ${i+1} of ${questions.length} — Which word did you hear?</div>
        <div class="audio-row">
          ${q.audioPath?`<audio controls src="${q.audioPath}" onplay="markPlayed(${i})"><source></audio>`:'<span style="color:var(--muted);font-size:12px">Audio unavailable</span>'}
          <span class="note">▶ once only</span>
        </div>
        <div class="choices">
          ${q.choices.map((c,ci)=>{let cls='';if(isDone){if(c.correct)cls='correct answered';else if(ci===sel)cls='wrong answered';else cls='dim answered';}else if(ci===sel)cls='selected';
          return`<button class="choice-btn ${cls}" onclick="pick(${i},${ci})" ${isDone?'disabled':''}><div class="cl">${LETTERS[ci]}</div>${c.text}</button>`;}).join('')}
        </div>
      </div>`;
    }).join('')}`;
}
function markPlayed(i){}
function pick(qIdx,ci){
  if(answered[qIdx])return;
  answers[qIdx]=ci;answered[qIdx]=true;render();
  const next=answered.findIndex(a=>!a);
  if(next>-1)setTimeout(()=>document.getElementById('qc-'+next)?.scrollIntoView({behavior:'smooth',block:'start'}),350);
}
window.getAnswers=function(){return questions.map((q,i)=>answered[i]&&answers[i]!==null?q.choices[answers[i]].text:'');};
function showError(msg){document.getElementById('root').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;}
</script></body></html>
