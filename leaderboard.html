<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Leaderboard — Superstars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<script src="config.js"></script>
<style>

/* ── Top Bar ────────────────────────────────────────────── */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-height);
  background: rgba(13,17,23,0.95);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center;
  padding: 0 var(--space-lg); gap: var(--space-md);
  z-index: 100;
}
.back-btn {
  width: 36px; height: 36px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: var(--text-secondary);
  transition: var(--transition-fast); text-decoration: none;
  flex-shrink: 0;
}
.back-btn:hover { border-color: var(--border-default); color: var(--text-primary); }
.bar-title {
  font-family: var(--font-display);
  font-size: 22px; letter-spacing: 3px; color: var(--text-primary);
}
.bar-spacer { flex: 1; }
.bar-rank {
  display: flex; align-items: center; gap: 6px;
  background: var(--blue-dim); border: 1px solid var(--blue-border);
  border-radius: var(--radius-full); padding: 5px 12px;
  font-family: var(--font-mono); font-size: 13px; color: var(--blue); font-weight: 700;
}

/* ── Page ───────────────────────────────────────────────── */
.page {
  padding-top: calc(var(--nav-height) + 20px);
  max-width: 680px; margin: 0 auto;
  padding-left: 16px; padding-right: 16px;
  padding-bottom: calc(var(--bottom-nav-h) + 20px);
  position: relative; z-index: 1;
}

/* ── Podium ─────────────────────────────────────────────── */
.podium-wrap {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 12px; margin-bottom: 28px;
  padding: 20px 0 0;
}
.podium-item {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; max-width: 160px;
}
.podium-avatar {
  border-radius: 50%; border: 3px solid var(--border-subtle);
  background: var(--bg-surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; overflow: hidden; position: relative;
  margin-bottom: 8px; flex-shrink: 0;
}
.podium-avatar img { width: 100%; height: 100%; object-fit: cover; }
.podium-crown {
  position: absolute; top: -18px; left: 50%;
  transform: translateX(-50%); font-size: 18px;
}
.pi-1 .podium-avatar {
  width: 72px; height: 72px;
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(255,215,0,0.25);
}
.pi-2 .podium-avatar { width: 60px; height: 60px; border-color: #C0C0C0; }
.pi-3 .podium-avatar { width: 56px; height: 56px; border-color: #CD7F32; }

.podium-name {
  font-size: 12px; font-weight: 700; color: var(--text-primary);
  margin-bottom: 3px; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%;
}
.podium-tokens {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--amber); margin-bottom: 8px;
}
.podium-block {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 10px 10px 0 0;
}
.pi-1 .podium-block { height: 72px; border-color: rgba(255,215,0,0.2); background: rgba(255,215,0,0.06); }
.pi-2 .podium-block { height: 52px; }
.pi-3 .podium-block { height: 38px; }

/* ── Tabs ───────────────────────────────────────────────── */
.tabs {
  display: flex; gap: 6px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md); padding: 4px;
  margin-bottom: 16px;
}
.tab-btn {
  flex: 1; padding: 9px;
  border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--text-muted);
  font-family: var(--font-body); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: var(--transition-fast); text-align: center;
}
.tab-btn.active {
  background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue-border);
}

/* ── My Rank Card ───────────────────────────────────────── */
.my-rank-card {
  background: var(--blue-dim);
  border: 1px solid var(--blue-border);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 16px; display: none;
}
.my-rank-num {
  font-family: var(--font-display);
  font-size: 36px; letter-spacing: 2px; color: var(--blue); line-height: 1;
}
.my-rank-label { font-size: 12px; color: var(--text-secondary); }
.my-rank-name  { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.my-rank-tok   { font-family: var(--font-mono); font-size: 12px; color: var(--amber); margin-top: 2px; }

/* ── List ───────────────────────────────────────────────── */
.lb-list { display: flex; flex-direction: column; gap: 7px; }

.lb-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 12px 16px;
  transition: var(--transition-fast);
}
.lb-item:hover { border-color: var(--border-default); }
.lb-item.me {
  border-color: var(--blue-border);
  background: var(--blue-dim);
}
.lb-item.top-3 { border-color: rgba(255,215,0,0.15); }

.lb-rank {
  font-family: var(--font-mono); font-size: 13px; font-weight: 700;
  width: 32px; text-align: center; flex-shrink: 0;
  color: var(--text-muted);
}
.lb-rank.r1 { color: var(--gold); font-size: 18px; }
.lb-rank.r2 { color: #C0C0C0; font-size: 16px; }
.lb-rank.r3 { color: #CD7F32; font-size: 15px; }

.lb-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg-overlay); border: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; overflow: hidden;
}
.lb-avatar img { width: 100%; height: 100%; object-fit: cover; }

.lb-info { flex: 1; min-width: 0; }
.lb-name {
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lb-sub  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

.lb-right { text-align: right; flex-shrink: 0; }
.lb-tokens {
  font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: var(--amber);
}
.lb-streak { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

/* ── Empty / Loading ─────────────────────────────────────── */
.empty-msg {
  text-align: center; padding: 48px 20px;
  color: var(--text-muted); font-size: 14px;
}
.empty-icon { font-size: 40px; margin-bottom: 10px; display: block; }

/* ── Bottom Nav ─────────────────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bottom-nav-h);
  background: rgba(13,17,23,0.97);
  backdrop-filter: blur(24px);
  border-top: 1px solid var(--border-subtle);
  display: flex; align-items: center;
  justify-content: space-around;
  padding: 0 var(--space-sm);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 100;
}
.bn-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 12px; border-radius: var(--radius-md);
  cursor: pointer; font-size: 10px; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em;
  transition: var(--transition-fast); min-width: 52px; text-align: center;
  text-decoration: none;
}
.bn-icon { font-size: 20px; transition: transform .2s cubic-bezier(.34,1.56,.64,1); }
.bn-item.active { color: var(--blue); }
.bn-item.active .bn-icon { transform: translateY(-2px); }

@media (max-width: 480px) {
  .podium-wrap { gap: 6px; }
  .pi-1 .podium-avatar { width: 60px; height: 60px; }
  .pi-2 .podium-avatar { width: 52px; height: 52px; }
  .pi-3 .podium-avatar { width: 48px; height: 48px; }
}
@media (min-width: 769px) {
  .bottom-nav { display: none; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow" style="width:500px;height:500px;top:-150px;right:-100px;background:radial-gradient(circle,rgba(56,189,248,0.05),transparent 70%)"></div>

<!-- ── TOP BAR ───────────────────────────────────────────── -->
<div class="top-bar">
  <a href="dashboard.html" class="back-btn">←</a>
  <div class="bar-title">🏆 RANKINGS</div>
  <div class="bar-spacer"></div>
  <div class="bar-rank" id="myRankBadge" style="display:none">
    My Rank: <span id="myRankNum">#—</span>
  </div>
</div>

<!-- ── PAGE ─────────────────────────────────────────────── -->
<div class="page">

  <!-- Podium top 3 -->
  <div class="podium-wrap" id="podiumWrap">
    <!-- 2nd -->
    <div class="podium-item pi-2" id="podium2">
      <div class="podium-avatar">👤</div>
      <div class="podium-name">—</div>
      <div class="podium-tokens">⚡ —</div>
      <div class="podium-block"></div>
    </div>
    <!-- 1st -->
    <div class="podium-item pi-1" id="podium1">
      <div class="podium-avatar">
        <div class="podium-crown">👑</div>
        👤
      </div>
      <div class="podium-name">—</div>
      <div class="podium-tokens">⚡ —</div>
      <div class="podium-block"></div>
    </div>
    <!-- 3rd -->
    <div class="podium-item pi-3" id="podium3">
      <div class="podium-avatar">👤</div>
      <div class="podium-name">—</div>
      <div class="podium-tokens">⚡ —</div>
      <div class="podium-block"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('season', this)">🏟️ Season</button>
    <button class="tab-btn" onclick="switchTab('general', this)">🌍 All Time</button>
  </div>

  <!-- My rank highlight -->
  <div class="my-rank-card" id="myRankCard">
    <div>
      <div class="my-rank-num" id="myRankCardNum">#—</div>
    </div>
    <div>
      <div class="my-rank-name" id="myRankCardName">—</div>
      <div class="my-rank-tok" id="myRankCardTok">⚡ 0</div>
      <div class="my-rank-label">Your current position</div>
    </div>
  </div>

  <!-- Full list -->
  <div class="lb-list" id="lbList">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>

</div>

<!-- ── BOTTOM NAV ────────────────────────────────────────── -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="bn-item">
    <span class="bn-icon">🏠</span><span>Home</span>
  </a>
  <a href="dashboard.html#activities" class="bn-item">
    <span class="bn-icon">🎯</span><span>Activities</span>
  </a>
  <div class="bn-item active">
    <span class="bn-icon">🏆</span><span>Ranks</span>
  </div>
  <a href="dashboard.html#inbox" class="bn-item">
    <span class="bn-icon">📬</span><span>Inbox</span>
  </a>
  <a href="dashboard.html#profile" class="bn-item">
    <span class="bn-icon">👤</span><span>Profile</span>
  </a>
</nav>

<script>
let student     = null;
let currentType = 'season';
let allData     = [];

window.addEventListener('DOMContentLoaded', async () => {
  student = Auth.require();
  if (!student) return;
  await loadLeaderboard('season');
});

async function switchTab(type, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = type;
  await loadLeaderboard(type);
}

async function loadLeaderboard(type) {
  const list = document.getElementById('lbList');
  list.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  // Hide podium while loading
  document.getElementById('podiumWrap').style.opacity = '.4';

  const result = await api('get_leaderboard', { student_id: student.student_id, type });

  if (!result.success) {
    list.innerHTML = '<div class="empty-msg"><span class="empty-icon">⚠️</span>Failed to load rankings. Please try again.</div>';
    return;
  }

  allData = result.leaderboard || [];
  renderList(allData);
  renderPodium(allData);
}

function renderPodium(items) {
  const podiumWrap = document.getElementById('podiumWrap');
  podiumWrap.style.opacity = '1';

  const slots = [
    { id: 'podium1', data: items[0], rank: 1, crown: true },
    { id: 'podium2', data: items[1], rank: 2, crown: false },
    { id: 'podium3', data: items[2], rank: 3, crown: false }
  ];

  slots.forEach(({ id, data, crown }) => {
    const el = document.getElementById(id);
    if (!data) { el.style.opacity = '.3'; return; }
    el.style.opacity = '1';

    const avatarEl = el.querySelector('.podium-avatar');
    const nameEl   = el.querySelector('.podium-name');
    const tokEl    = el.querySelector('.podium-tokens');

    // Photo — only if approved
    if (data.photo_url) {
      avatarEl.innerHTML = (crown ? '<div class="podium-crown">👑</div>' : '') +
        `<img src="${data.photo_url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    } else {
      avatarEl.innerHTML = (crown ? '<div class="podium-crown">👑</div>' : '') + '👤';
    }

    nameEl.textContent = data.full_name || '—';
    tokEl.textContent  = '⚡ ' + (data.tokens || 0).toLocaleString();
  });
}

function renderList(items) {
  const list = document.getElementById('lbList');
  list.innerHTML = '';

  let myRank = -1;

  items.forEach((s, idx) => {
    const rank  = idx + 1;
    const isMe  = s.student_id === student.student_id;

    if (isMe) {
      myRank = rank;
      // Show my rank badge in top bar
      document.getElementById('myRankBadge').style.display = 'flex';
      document.getElementById('myRankNum').textContent = '#' + rank;

      // Show my rank card
      const card = document.getElementById('myRankCard');
      card.style.display = 'flex';
      document.getElementById('myRankCardNum').textContent  = '#' + rank;
      document.getElementById('myRankCardName').textContent = s.full_name || '—';
      document.getElementById('myRankCardTok').textContent  = '⚡ ' + (s.tokens || 0).toLocaleString();
    }

    const rankEmoji = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const rankCls   = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';

    const item = document.createElement('div');
    item.className = [
      'lb-item',
      isMe ? 'me' : '',
      rank <= 3 ? 'top-3' : ''
    ].filter(Boolean).join(' ');

    const avatarHTML = s.photo_url
      ? `<img src="${s.photo_url}" alt="">`
      : '👤';

    item.innerHTML = `
      <div class="lb-rank ${rankCls}">${rankEmoji}</div>
      <div class="lb-avatar">${avatarHTML}</div>
      <div class="lb-info">
        <div class="lb-name">${s.full_name || '—'}${isMe ? ' <span style="color:var(--blue);font-size:10px;font-weight:700;">(you)</span>' : ''}</div>
        <div class="lb-sub">${currentType === 'season' ? CONFIG.SEASON.NAME : 'All Time'}</div>
      </div>
      <div class="lb-right">
        <div class="lb-tokens">⚡ ${(s.tokens || 0).toLocaleString()}</div>
      </div>
    `;

    list.appendChild(item);
  });

  if (!items.length) {
    list.innerHTML = '<div class="empty-msg"><span class="empty-icon">🏆</span>No rankings yet. Be the first to complete an activity!</div>';
    return;
  }

  // ✅ لو الـ student مش في الـ top — scroll للـ my rank card
  if (myRank > 10) {
    setTimeout(() => {
      document.getElementById('myRankCard')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 300);
  }
}
</script>
</body>
</html>
