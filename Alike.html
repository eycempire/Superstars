<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Alike Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#FFD700; --gold2:#FFA500; --dark:#0F0F1A; --dark2:#181825; --dark3:#222235;
  --border:rgba(255,215,0,0.12); --border2:rgba(255,255,255,0.07);
  --text:#EEEEF5; --muted:#7777AA; --muted2:#AAAACC; --success:#10B981; --error:#EF4444;
  --font-b:'Syne',sans-serif; --font-mono:'JetBrains Mono',monospace; --radius:14px;
}
body { font-family:var(--font-b); background:var(--dark); color:var(--text); padding:16px 14px 32px; }

.header { margin-bottom:16px; }
.h-title { font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.h-sub   { font-size:12px; color:var(--muted2); line-height:1.5; }

.instructions {
  background:var(--dark2); border:1px solid var(--border2);
  border-radius:var(--radius); padding:12px 14px; margin-bottom:16px;
}
.inst-row { font-size:12px; color:var(--muted2); margin-bottom:4px; display:flex; gap:7px; align-items:flex-start; line-height:1.5; }
.inst-row:last-child { margin-bottom:0; }

.progress-info { display:flex; justify-content:space-between; margin-bottom:14px; font-size:12px; color:var(--muted); }
.progress-info strong { color:var(--gold); font-family:var(--font-mono); }

.pairs-list { display:flex; flex-direction:column; gap:10px; }

.pair-card {
  background:var(--dark2); border:1.5px solid var(--border2);
  border-radius:var(--radius); padding:14px;
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  transition:border-color .2s;
}
.pair-card.all-ok  { border-color:rgba(16,185,129,0.25); }
.pair-card.has-err { border-color:rgba(239,68,68,0.2); }

.pair-num { font-size:9px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); grid-column:1/-1; margin-bottom:2px; }

.word-slot { display:flex; flex-direction:column; gap:6px; }
.arabic-word {
  background:rgba(255,215,0,0.07); border:1px solid rgba(255,215,0,0.15);
  border-radius:8px; padding:10px 12px; text-align:center;
  font-size:16px; font-weight:700; color:var(--gold);
  direction:rtl;
}
.english-input {
  background:var(--dark3); border:1.5px solid var(--border2);
  border-radius:8px; padding:9px 12px;
  color:var(--text); font-family:var(--font-b);
  font-size:13px; font-weight:600;
  outline:none; transition:border-color .2s; width:100%;
  text-align:center; caret-color:var(--gold);
}
.english-input:focus { border-color:rgba(255,215,0,0.35); }
.english-input.ok  { border-color:rgba(16,185,129,0.4); background:rgba(16,185,129,0.06); color:#6EE7B7; }
.english-input.err { border-color:rgba(239,68,68,0.3);  background:rgba(239,68,68,0.06); color:#FCA5A5; }
.english-input::placeholder { color:var(--muted); font-weight:400; }
.slot-label { font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.06em; text-align:center; }

.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,215,0,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading task...</div></div></div>
<script src="../config.js"></script>
<script>
const params     = new URLSearchParams(window.location.search);
const taskNumber = parseInt(params.get('task')) || 1;
const studentId  = params.get('student') || '';
let taskData = null;
const TOTAL = 10;

window.addEventListener('DOMContentLoaded', async () => {
  const r = await api('get_task_data', { student_id:studentId, activity_name:'Alike', task_number:taskNumber });
  if (!r.success || !r.task) { showError('Could not load task.'); return; }
  taskData = r.task;
  render();
});

function render() {
  const pairs = [];
  for (let i = 1; i <= TOTAL; i++) {
    const ar1 = taskData[`AR_Word_${i}`]   || '';
    const en1 = taskData[`EN_Answer_${i}`] || '';
    if (ar1) pairs.push({ ar: ar1, en: en1, idx: i });
  }

  document.getElementById('root').innerHTML = `
    <div class="header">
      <div class="h-title">Alike · Task ${taskNumber}</div>
      <div class="h-sub">Write the English homophone for each Arabic word.</div>
    </div>
    <div class="instructions">
      <div class="inst-row"><span>👂</span>These word pairs sound the same in English (homophones).</div>
      <div class="inst-row"><span>✍️</span>Write the correct English spelling for each Arabic word.</div>
      <div class="inst-row"><span>⚠️</span>Spelling must be exact. Uppercase/lowercase is fine.</div>
    </div>
    <div class="progress-info">
      <span>Pairs: <strong id="filledCount">0</strong> / ${TOTAL}</span>
      <span>⚡ up to ${CONFIG?.TOKENS?.Alike||40} tokens</span>
    </div>
    <div class="pairs-list">
      ${pairs.map((p,i) => `
        <div class="pair-card" id="pc-${i}">
          <div class="pair-num">Pair ${p.idx}</div>
          <div class="word-slot">
            <div class="slot-label">Arabic</div>
            <div class="arabic-word">${p.ar.split('/')[0]||p.ar}</div>
            <input type="text" class="english-input" id="inp-${i}-0"
              placeholder="English..." maxlength="40"
              oninput="updateCount()" autocomplete="off" spellcheck="false">
          </div>
          <div class="word-slot">
            <div class="slot-label">Arabic</div>
            <div class="arabic-word">${p.ar.split('/')[1]||'—'}</div>
            <input type="text" class="english-input" id="inp-${i}-1"
              placeholder="English..." maxlength="40"
              oninput="updateCount()" autocomplete="off" spellcheck="false">
          </div>
        </div>`).join('')}
    </div>
  `;
}

function updateCount() {
  let filled = 0;
  for (let i = 0; i < TOTAL; i++) {
    const a = document.getElementById(`inp-${i}-0`)?.value?.trim();
    const b = document.getElementById(`inp-${i}-1`)?.value?.trim();
    if (a && b) filled++;
  }
  const el = document.getElementById('filledCount');
  if (el) el.textContent = filled;
}

window.getAnswers = function() {
  const answers = [];
  for (let i = 0; i < TOTAL; i++) {
    const a = document.getElementById(`inp-${i}-0`)?.value?.trim() || '';
    const b = document.getElementById(`inp-${i}-1`)?.value?.trim() || '';
    answers.push(a);
    answers.push(b);
  }
  return answers;
};

function showError(msg) {
  document.getElementById('root').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;
}
</script>
</body>
</html>
