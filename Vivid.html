<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vivid Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#FFD700; --gold2:#FFA500;
  --dark:#0F0F1A; --dark2:#181825; --dark3:#222235;
  --border:rgba(255,215,0,0.12); --border2:rgba(255,255,255,0.07);
  --text:#EEEEF5; --muted:#7777AA; --muted2:#AAAACC;
  --success:#10B981; --error:#EF4444;
  --font-b:'Syne',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --radius:14px;
}
body { font-family:var(--font-b); background:var(--dark); color:var(--text); padding:20px 16px 32px; }

.img-wrap {
  border-radius:var(--radius); overflow:hidden;
  border:1px solid var(--border2); margin-bottom:16px;
  background:var(--dark2);
  position:relative;
}
.task-img {
  width:100%; max-height:300px; object-fit:cover; display:block;
}
.img-placeholder {
  height:200px; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:10px; color:var(--muted);
}
.img-placeholder .pi { font-size:48px; }
.img-placeholder p { font-size:13px; }

.instructions {
  background:var(--dark2); border:1px solid var(--border2);
  border-radius:var(--radius); padding:14px 16px; margin-bottom:16px;
}
.inst-row { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:var(--muted2); margin-bottom:6px; line-height:1.5; }
.inst-row:last-child { margin-bottom:0; }

.wc-bar-wrap { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.wc-track { flex:1; height:4px; background:var(--dark3); border-radius:100px; overflow:hidden; }
.wc-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--gold),var(--gold2)); transition:width .3s; }
.wc-fill.over  { background:linear-gradient(90deg,var(--error),#FCA5A5); }
.wc-fill.ready { background:linear-gradient(90deg,var(--success),#6EE7B7); }
.wc-label { font-family:var(--font-mono); font-size:12px; color:var(--muted2); white-space:nowrap; min-width:80px; text-align:right; }
.wc-label.ready { color:var(--success); } .wc-label.over { color:var(--error); }

.desc-ta {
  width:100%; min-height:200px;
  background:var(--dark2); border:1.5px solid var(--border2);
  border-radius:var(--radius); padding:16px;
  color:var(--text); font-family:var(--font-b);
  font-size:14px; line-height:1.8; resize:vertical; outline:none;
  transition:border-color .2s; caret-color:var(--gold);
}
.desc-ta:focus { border-color:rgba(255,215,0,0.3); }
.desc-ta::placeholder { color:var(--muted); }

.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,215,0,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading image...</div></div></div>
<script src="../config.js"></script>
<script>
const params     = new URLSearchParams(window.location.search);
const taskNumber = parseInt(params.get('task')) || 1;
const studentId  = params.get('student') || '';

let taskData    = null;
let typingStart = null;
const MIN_WORDS = 100;
const MAX_WORDS = 250;

window.addEventListener('DOMContentLoaded', async () => {
  const result = await api('get_task_data', {
    student_id: studentId, activity_name: 'Vivid', task_number: taskNumber
  });
  if (!result.success || !result.task) { showError('Could not load task.'); return; }
  taskData = result.task;
  render();
  typingStart = Date.now();
});

function render() {
  const imgPath = taskData.Image_Path || '';
  document.getElementById('root').innerHTML = `
    <div class="img-wrap">
      ${imgPath
        ? `<img src="${imgPath}" class="task-img" alt="Describe this image" onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><span class=\\'pi\\'>🖼️</span><p>Image could not be loaded</p></div>'">`
        : `<div class="img-placeholder"><span class="pi">🖼️</span><p>Image loading...</p></div>`}
    </div>

    <div class="instructions">
      <div class="inst-row"><span>🖊️</span>Look at the image carefully and describe what you see in detail.</div>
      <div class="inst-row"><span>📏</span>Minimum <strong>${MIN_WORDS} words</strong> — Maximum <strong>${MAX_WORDS} words</strong>.</div>
      <div class="inst-row"><span>💡</span>Include colors, objects, people, actions, mood, and setting.</div>
      <div class="inst-row"><span>🚫</span>Do not use AI tools — detected submissions earn 0 tokens.</div>
    </div>

    <div class="wc-bar-wrap">
      <div class="wc-track"><div class="wc-fill" id="wcFill" style="width:0%"></div></div>
      <div class="wc-label" id="wcLabel">0 / ${MIN_WORDS} min</div>
    </div>

    <textarea class="desc-ta" id="descTa"
      placeholder="Describe everything you see in the image..."
      oninput="onType(this)" maxlength="2500"></textarea>
  `;
}

function onType(ta) {
  const words = (ta.value.match(/\b\w+\b/g) || []).length;
  const pct   = Math.min((words / MAX_WORDS) * 100, 100);
  const fill  = document.getElementById('wcFill');
  const label = document.getElementById('wcLabel');
  fill.style.width = pct + '%';
  fill.className   = 'wc-fill' + (words > MAX_WORDS ? ' over' : words >= MIN_WORDS ? ' ready' : '');
  label.textContent= words + ' words';
  label.className  = 'wc-label' + (words > MAX_WORDS ? ' over' : words >= MIN_WORDS ? ' ready' : '');
}

window.getAnswers = function() {
  const text  = document.getElementById('descTa')?.value || '';
  const words = (text.match(/\b\w+\b/g) || []).length;
  if (words < MIN_WORDS) throw new Error(`Description too short (${words} words). Minimum is ${MIN_WORDS}.`);
  if (words > MAX_WORDS) throw new Error(`Description too long (${words} words). Maximum is ${MAX_WORDS}.`);
  return text;
};

window.getTypingDuration = function() { return typingStart ? Date.now() - typingStart : 999999; };

function showError(msg) {
  document.getElementById('root').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;
}
</script>
</body>
</html>
