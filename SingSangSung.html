<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sing Sang Sung Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#FFD700; --gold2:#FFA500; --dark:#0F0F1A; --dark2:#181825; --dark3:#222235;
  --border:rgba(255,215,0,0.12); --border2:rgba(255,255,255,0.07);
  --text:#EEEEF5; --muted:#7777AA; --muted2:#AAAACC; --success:#10B981; --error:#EF4444;
  --font-b:'Syne',sans-serif; --font-mono:'JetBrains Mono',monospace; --radius:14px;
}
body { font-family:var(--font-b); background:var(--dark); color:var(--text); padding:16px 14px 32px; }

.song-card {
  background:linear-gradient(135deg,rgba(255,215,0,0.06),rgba(255,165,0,0.03));
  border:1px solid rgba(255,215,0,0.18); border-radius:var(--radius);
  padding:20px; margin-bottom:18px; position:relative; overflow:hidden;
}
.song-card::before { content:''; position:absolute; top:0; left:10%; right:10%; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.song-icon { font-size:32px; margin-bottom:8px; display:block; }
.song-label { font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
.song-text {
  font-size:18px; line-height:1.9; color:var(--text);
  direction:rtl; text-align:right;
  font-weight:600; padding:8px 0;
}

.instructions {
  background:var(--dark2); border:1px solid var(--border2);
  border-radius:var(--radius); padding:12px 14px; margin-bottom:16px;
}
.inst-row { font-size:12px; color:var(--muted2); margin-bottom:4px; display:flex; gap:7px; align-items:flex-start; line-height:1.5; }
.inst-row:last-child { margin-bottom:0; }

.wc-bar-wrap { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.wc-track { flex:1; height:4px; background:var(--dark3); border-radius:100px; overflow:hidden; }
.wc-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--gold),var(--gold2)); transition:width .3s; }
.wc-fill.ready { background:linear-gradient(90deg,var(--success),#6EE7B7); }
.wc-label { font-family:var(--font-mono); font-size:12px; color:var(--muted2); white-space:nowrap; min-width:70px; text-align:right; }
.wc-label.ready { color:var(--success); }

.trans-ta {
  width:100%; min-height:200px; background:var(--dark2); border:1.5px solid var(--border2);
  border-radius:var(--radius); padding:16px; color:var(--text); font-family:var(--font-b);
  font-size:14px; line-height:1.8; resize:vertical; outline:none;
  transition:border-color .2s; caret-color:var(--gold);
}
.trans-ta:focus { border-color:rgba(255,215,0,0.3); }
.trans-ta::placeholder { color:var(--muted); }

.pending-note { background:rgba(59,130,246,0.07); border:1px solid rgba(59,130,246,0.18); border-radius:var(--radius); padding:12px 14px; font-size:12px; color:#93C5FD; margin-top:12px; }

.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,215,0,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading song...</div></div></div>
<script src="../config.js"></script>
<script>
const params     = new URLSearchParams(window.location.search);
const taskNumber = parseInt(params.get('task')) || 1;
const studentId  = params.get('student') || '';
let taskData    = null;
let typingStart = null;
const MIN_WORDS = 100;

window.addEventListener('DOMContentLoaded', async () => {
  const r = await api('get_task_data', { student_id:studentId, activity_name:'SingSangSung', task_number:taskNumber });
  if (!r.success || !r.task) { showError('Could not load task.'); return; }
  taskData = r.task;
  render();
  typingStart = Date.now();
});

function render() {
  document.getElementById('root').innerHTML = `
    <div class="song-card">
      <span class="song-icon">🎵</span>
      <div class="song-label">Sing Sang Sung · Task ${taskNumber} · Arabic Song Excerpt</div>
      <div class="song-text">${taskData.Arabic_Lyrics || '...'}</div>
    </div>
    <div class="instructions">
      <div class="inst-row"><span>🌍</span>Translate the Arabic song excerpt above into English.</div>
      <div class="inst-row"><span>📏</span>Minimum <strong>${MIN_WORDS} words</strong>. No maximum.</div>
      <div class="inst-row"><span>🎨</span>Capture the spirit and meaning — not just word-for-word.</div>
      <div class="inst-row"><span>🚫</span>Do not use AI tools — detected submissions earn 0 tokens.</div>
    </div>
    <div class="wc-bar-wrap">
      <div class="wc-track"><div class="wc-fill" id="wcFill" style="width:0%"></div></div>
      <div class="wc-label" id="wcLabel">0 / ${MIN_WORDS} min</div>
    </div>
    <textarea class="trans-ta" id="transTa"
      placeholder="Write your English translation here..."
      oninput="onType(this)" maxlength="3000"></textarea>
    <div class="pending-note">📬 Your translation will be reviewed and your score sent to your Inbox. This may take some time.</div>
  `;
}

function onType(ta) {
  const words = (ta.value.match(/\b\w+\b/g)||[]).length;
  const pct   = Math.min((words/MIN_WORDS)*100, 100);
  const fill  = document.getElementById('wcFill');
  const label = document.getElementById('wcLabel');
  fill.style.width = pct + '%';
  fill.className   = 'wc-fill' + (words >= MIN_WORDS ? ' ready' : '');
  label.textContent= words + ' words';
  label.className  = 'wc-label' + (words >= MIN_WORDS ? ' ready' : '');
}

window.getAnswers = function() {
  const text  = document.getElementById('transTa')?.value || '';
  const words = (text.match(/\b\w+\b/g)||[]).length;
  if (words < MIN_WORDS) throw new Error(`Translation too short (${words} words). Minimum is ${MIN_WORDS}.`);
  return text;
};

window.getTypingDuration = function() { return typingStart ? Date.now()-typingStart : 999999; };

function showError(msg) {
  document.getElementById('root').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;
}
</script>
</body>
</html>
