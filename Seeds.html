<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Seeds Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #FFD700; --gold2: #FFA500;
  --dark: #0F0F1A; --dark2: #181825; --dark3: #222235;
  --border: rgba(255,215,0,0.12); --border2: rgba(255,255,255,0.07);
  --text: #EEEEF5; --muted: #7777AA; --muted2: #AAAACC;
  --success: #10B981; --error: #EF4444;
  --font-b: 'Syne',sans-serif; --font-mono: 'JetBrains Mono',monospace;
  --radius: 14px; --radius-sm: 8px;
}
body { font-family:var(--font-b); background:var(--dark); color:var(--text); padding:20px 16px 32px; min-height:100vh; }

/* Words display */
.words-section { margin-bottom: 20px; }
.ws-label { font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.words-grid { display:flex; flex-wrap:wrap; gap:8px; }
.word-chip {
  display:flex; align-items:center; gap:6px;
  padding:8px 14px;
  border-radius:100px;
  font-size:13px; font-weight:700;
  border:1.5px solid;
  transition:all .3s;
  cursor:default;
}
.word-chip.theme {
  background:rgba(255,215,0,0.07);
  border-color:rgba(255,215,0,0.25);
  color:var(--gold);
}
.word-chip.outlier {
  background:rgba(168,85,247,0.07);
  border-color:rgba(168,85,247,0.25);
  color:#D8B4FE;
}
.word-chip.used {
  background:rgba(16,185,129,0.08);
  border-color:rgba(16,185,129,0.3);
  color:#6EE7B7;
}
.word-chip .wc-icon { font-size:12px; }

/* Instructions */
.instructions {
  background:var(--dark2);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:18px;
}
.inst-row { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:var(--muted2); margin-bottom:6px; line-height:1.5; }
.inst-row:last-child { margin-bottom:0; }
.inst-icon { font-size:14px; flex-shrink:0; }

/* Word count bar */
.wc-bar-wrap {
  display:flex; align-items:center; gap:10px;
  margin-bottom:16px;
}
.wc-track {
  flex:1; height:4px; background:var(--dark3);
  border-radius:100px; overflow:hidden;
}
.wc-fill {
  height:100%; border-radius:100px;
  background:linear-gradient(90deg, var(--gold), var(--gold2));
  transition:width .3s;
}
.wc-fill.over  { background:linear-gradient(90deg, var(--error), #FCA5A5); }
.wc-fill.ready { background:linear-gradient(90deg, var(--success), #6EE7B7); }
.wc-label {
  font-family:var(--font-mono);
  font-size:12px; font-weight:600; white-space:nowrap;
  color:var(--muted2); min-width:90px; text-align:right;
}
.wc-label.ready { color:var(--success); }
.wc-label.over  { color:var(--error); }

/* Textarea */
.story-wrap { position:relative; margin-bottom:16px; }
.story-ta {
  width:100%; min-height:220px;
  background:var(--dark2);
  border:1.5px solid var(--border2);
  border-radius:var(--radius);
  padding:16px;
  color:var(--text);
  font-family:var(--font-b);
  font-size:14px; line-height:1.8;
  resize:vertical; outline:none;
  transition:border-color .2s;
  caret-color:var(--gold);
}
.story-ta:focus { border-color:rgba(255,215,0,0.3); }
.story-ta::placeholder { color:var(--muted); }

/* Keyword tracker */
.kw-tracker {
  display:flex; flex-wrap:wrap; gap:6px;
  margin-bottom:12px;
}
.kw-pill {
  display:flex; align-items:center; gap:4px;
  padding:4px 10px;
  border-radius:100px;
  font-size:11px; font-weight:700;
  border:1px solid var(--border2);
  color:var(--muted); background:var(--dark3);
  transition:all .2s;
}
.kw-pill.found {
  background:rgba(16,185,129,0.08);
  border-color:rgba(16,185,129,0.25);
  color:#6EE7B7;
}
.kw-pill .kw-check { font-size:10px; }

/* Typing speed warning */
.speed-warn {
  background:rgba(245,158,11,0.08);
  border:1px solid rgba(245,158,11,0.2);
  border-radius:var(--radius-sm);
  padding:10px 14px;
  font-size:12px; color:#FCD34D;
  display:none; margin-bottom:12px;
}

/* Loading */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,215,0,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:13px; color:var(--muted); }
</style>
</head>
<body>

<div id="root">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading task...</div>
  </div>
</div>

<script src="../config.js"></script>
<script>
const params     = new URLSearchParams(window.location.search);
const taskNumber = parseInt(params.get('task')) || 1;
const studentId  = params.get('student') || '';

let taskData    = null;
let keywords    = [];
let typingStart = null;
const MIN_WORDS = 120;
const MAX_WORDS = 250;

window.addEventListener('DOMContentLoaded', async () => {
  const result = await api('get_task_data', {
    student_id: studentId, activity_name: 'Seeds', task_number: taskNumber
  });

  if (!result.success || !result.task) {
    showError('Could not load task.'); return;
  }
  taskData = result.task;
  keywords = [
    taskData.Word_1, taskData.Word_2, taskData.Word_3,
    taskData.Word_4, taskData.Word_5, taskData.Word_6
  ].filter(Boolean);

  render();
  typingStart = Date.now();
});

function render() {
  const outlier = taskData.Outlier_Word || keywords[5];
  const themeWords = keywords.slice(0, 5);

  document.getElementById('root').innerHTML = `
    <!-- Words -->
    <div class="words-section">
      <div class="ws-label">Your 6 Words — Use ALL of them in your story</div>
      <div class="words-grid">
        ${themeWords.map(w => `<div class="word-chip theme" id="chip-${w.toLowerCase()}"><span class="wc-icon">🌱</span>${w}</div>`).join('')}
        <div class="word-chip outlier" id="chip-${outlier.toLowerCase()}"><span class="wc-icon">⚡</span>${outlier}</div>
      </div>
    </div>

    <!-- Instructions -->
    <div class="instructions">
      <div class="inst-row"><span class="inst-icon">📝</span>Write a story using all 6 words. Make it creative!</div>
      <div class="inst-row"><span class="inst-icon">📏</span>Minimum <strong>120 words</strong> — Maximum <strong>250 words</strong>.</div>
      <div class="inst-row"><span class="inst-icon">🚫</span>Do not use AI tools — detected submissions earn 0 tokens.</div>
    </div>

    <!-- Word count bar -->
    <div class="wc-bar-wrap">
      <div class="wc-track"><div class="wc-fill" id="wcFill" style="width:0%"></div></div>
      <div class="wc-label" id="wcLabel">0 / ${MIN_WORDS} min</div>
    </div>

    <!-- Speed warning -->
    <div class="speed-warn" id="speedWarn">⚡ You're typing very fast. Make sure this is your own work!</div>

    <!-- Keyword tracker -->
    <div class="kw-tracker" id="kwTracker">
      ${keywords.map(w => `<div class="kw-pill" id="kw-${w.toLowerCase()}"><span class="kw-check">○</span>${w}</div>`).join('')}
    </div>

    <!-- Textarea -->
    <div class="story-wrap">
      <textarea class="story-ta" id="storyTa"
        placeholder="Once upon a time..."
        oninput="onType(this)"
        maxlength="2000"></textarea>
    </div>
  `;
}

function onType(ta) {
  const text  = ta.value;
  const words = (text.match(/\b\w+\b/g) || []).length;
  const pct   = Math.min((words / MAX_WORDS) * 100, 100);

  // Word count bar
  const fill  = document.getElementById('wcFill');
  const label = document.getElementById('wcLabel');
  fill.style.width = pct + '%';
  fill.className   = 'wc-fill' + (words > MAX_WORDS ? ' over' : words >= MIN_WORDS ? ' ready' : '');
  label.textContent= words + ' words';
  label.className  = 'wc-label' + (words > MAX_WORDS ? ' over' : words >= MIN_WORDS ? ' ready' : '');

  // Keyword tracking
  const lower = text.toLowerCase();
  keywords.forEach(kw => {
    const found = lower.includes(kw.toLowerCase());
    const pill  = document.getElementById('kw-' + kw.toLowerCase());
    const chip  = document.getElementById('chip-' + kw.toLowerCase());
    if (pill) {
      pill.className = 'kw-pill' + (found ? ' found' : '');
      pill.querySelector('.kw-check').textContent = found ? '✓' : '○';
    }
    if (chip) chip.className = 'word-chip' + (chip.className.includes('outlier') ? ' outlier' : ' theme') + (found ? ' used' : '');
  });

  // Speed check (>15 chars/sec suspicious)
  if (typingStart) {
    const elapsed    = (Date.now() - typingStart) / 1000;
    const charsPerSec= text.length / Math.max(elapsed, 1);
    document.getElementById('speedWarn').style.display = charsPerSec > 15 ? 'block' : 'none';
  }
}

// Exposed to parent
window.getAnswers = function() {
  const text  = document.getElementById('storyTa')?.value || '';
  const words = (text.match(/\b\w+\b/g) || []).length;
  if (words < MIN_WORDS) throw new Error(`Story too short (${words} words). Minimum is ${MIN_WORDS}.`);
  if (words > MAX_WORDS) throw new Error(`Story too long (${words} words). Maximum is ${MAX_WORDS}.`);
  return text;
};

window.getTypingDuration = function() {
  return typingStart ? Date.now() - typingStart : 999999;
};

function showError(msg) {
  document.getElementById('root').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;
}
</script>
</body>
</html>
