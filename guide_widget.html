<style>
/* ── Floating Button ─────────────────────────────────────── */
#guideBtn {
  position: fixed; bottom: 24px; right: 20px;
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--blue, #38BDF8), #7DD3FC);
  border: none; border-radius: 50%;
  cursor: pointer; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: 0 4px 20px rgba(56,189,248,0.45);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
  animation: guidePulse 3s ease-in-out infinite;
}
@keyframes guidePulse {
  0%,100% { box-shadow: 0 4px 20px rgba(56,189,248,0.45); }
  50%      { box-shadow: 0 4px 32px rgba(56,189,248,0.75); }
}
#guideBtn:hover { transform: scale(1.12) rotate(-8deg); }
#guideBtn.open  { transform: rotate(15deg); animation: none; box-shadow: 0 4px 24px rgba(56,189,248,0.5); }

/* Tooltip */
#guideBtn::after {
  content: 'المساعد'; position: absolute; right: 64px;
  background: rgba(13,17,23,0.92); color: #E2E8F0;
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 8px; padding: 5px 10px;
  font-size: 12px; font-family: 'Cairo', sans-serif;
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity .2s;
}
#guideBtn:hover::after { opacity: 1; }

/* ── Chat Window ─────────────────────────────────────────── */
#guideWindow {
  position: fixed; bottom: 92px; right: 20px;
  width: 340px; height: 480px;
  background: #0D1117;
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 20px;
  display: flex; flex-direction: column;
  z-index: 998;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  transform: scale(0.85) translateY(20px);
  opacity: 0; pointer-events: none;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  overflow: hidden;
}
#guideWindow.show {
  transform: scale(1) translateY(0);
  opacity: 1; pointer-events: all;
}

/* Header */
.gw-header {
  background: linear-gradient(135deg, rgba(56,189,248,0.12), rgba(56,189,248,0.05));
  border-bottom: 1px solid rgba(56,189,248,0.15);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
}
.gw-avatar {
  width: 36px; height: 36px; border-radius: 50%;

  font-size: 18px; flex-shrink: 0;
}
.gw-info { flex: 1; }
.gw-name  { font-size: 14px; font-weight: 700; color: #E2E8F0; font-family: 'Cairo', sans-serif; }
.gw-status{ font-size: 11px; color: #38BDF8; display: flex; align-items: center; gap: 4px; }
.gw-status .dot { width: 6px; height: 6px; border-radius: 50%; background: #34D399; animation: guidePulse 2s infinite; }
.gw-close {
  width: 28px; height: 28px; border-radius: 50%;

}
.gw-close:hover { background: rgba(248,113,113,0.15); color: #F87171; }

/* Gemini button */
.gw-gemini {

  border-radius: 100px;
  font-size: 11px; font-weight: 700;
  color: #A78BFA; cursor: pointer;

}
.gw-gemini:hover { background: rgba(167,139,250,0.22); }

/* Messages */
.gw-messages {

}
.gw-messages::-webkit-scrollbar { width: 4px; }
.gw-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 100px; }

.msg {
  max-width: 85%; padding: 9px 13px;
  border-radius: 14px; font-size: 13px; line-height: 1.55;

}
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg.bot {

  border: 1px solid rgba(56,189,248,0.15);

}
.msg.user {

  border: 1px solid rgba(56,189,248,0.3);

  text-align: right;
}
.msg.loading {
  background: rgba(56,189,248,0.08);
  border: 1px solid rgba(56,189,248,0.15);
  color: #64748B; align-self: flex-start;
  font-style: italic;
}

/* Suggestions */
.gw-suggestions {
  display: flex; flex-wrap: wrap; gap: 5px;

}
.sug-btn {
  padding: 5px 10px;
  background: rgba(56,189,248,0.06);
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 100px; font-size: 11px;
  color: #38BDF8; cursor: pointer;

}
.sug-btn:hover { background: rgba(56,189,248,0.14); }

/* Input */
.gw-input-row {

}

}
.gw-input:focus { border-color: rgba(56,189,248,0.35); }

.gw-send {

  transition: all .15s; flex-shrink: 0;
}
.gw-send:hover { transform: scale(1.1); box-shadow: 0 4px 12px rgba(56,189,248,0.4); }

/* Mobile */
@media (max-width: 400px) {
  #guideWindow { width: calc(100vw - 24px); right: 12px; bottom: 80px; }

<!-- Floating button -->
<button id="guideBtn" onclick="toggleGuide()" title="المساعد">🤖</button>

<!-- Chat window -->
<div id="guideWindow">
  <div class="gw-header">
    <div class="gw-avatar">🤖</div>
    <div class="gw-info">
      <div class="gw-name">روبي — المساعد</div>
      <div class="gw-status"><div class="dot"></div> متاح دايماً</div>
    </div>
    <a class="gw-gemini" id="geminiLink" href="YOUR_GEM_LINK_HERE" target="_blank">✨ Ask Gemini</a>
    <button class="gw-close" onclick="toggleGuide()">✕</button>
  </div>

  <div class="gw-messages" id="gwMessages"></div>

  <div class="gw-suggestions" id="gwSuggestions"></div>

  <div class="gw-input-row">
    <input class="gw-input" id="gwInput" placeholder="اسألني أي حاجة..."
      onkeydown="if(event.key==='Enter')sendGuide()">

  </div>

<script>
// ── Config ────────────────────────────────────────────────
const GUIDE_SHEET_URL = 'YOUR_GUIDE_APPS_SCRIPT_URL'; // ← هتحطه بعدين
const GEMINI_GEM_URL  = 'YOUR_GEM_LINK_HERE';         // ← هتحطه بعدين

// ── State ─────────────────────────────────────────────────
let guideOpen    = false;
let guideHistory = [];
let studentName  = '';

// ── Init ──────────────────────────────────────────────────
(function initGuide() {
  // Try to get student name from localStorage
  try {
    const st = JSON.parse(localStorage.getItem('ss_student'));
    if (st && st.full_name) studentName = st.full_name.split(' ')[0];
  } catch(e) {}

  // Update Gemini link
  document.getElementById('geminiLink').href = GEMINI_GEM_URL;

  // Welcome message
  const greeting = studentName
    ? `أهلاً ${studentName}! 👋 أنا روبي، مساعدك في Superstars. اسألني أي حاجة عن البطولة أو الأنشطة.`
    : 'أهلاً! 👋 أنا روبي، مساعدك في Superstars. اسألني أي حاجة عن البطولة أو الأنشطة.';

  addMsg('bot', greeting);
  showSuggestions(['إزاي أكسب توكينز؟', 'الأنشطة إيه؟', 'الاشتراك بكام؟', 'إزاي أرفع في الترتيب؟']);
})();

// ── Toggle ────────────────────────────────────────────────
function toggleGuide() {
  guideOpen = !guideOpen;
  document.getElementById('guideWindow').classList.toggle('show', guideOpen);
  document.getElementById('guideBtn').classList.toggle('open', guideOpen);
  if (guideOpen) {
    setTimeout(() => document.getElementById('gwInput').focus(), 300);
  }
}

// ── Messages ──────────────────────────────────────────────
function addMsg(type, text) {
  const msgs = document.getElementById('gwMessages');
  const div  = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showSuggestions(sugs) {
  const wrap = document.getElementById('gwSuggestions');
  wrap.innerHTML = sugs.map(s =>
    `<button class="sug-btn" onclick="askSuggestion('${s}')">${s}</button>`
  ).join('');
}

function askSuggestion(text) {
  document.getElementById('gwInput').value = text;
  sendGuide();
}

// ── Send ──────────────────────────────────────────────────
async function sendGuide() {
  const input = document.getElementById('gwInput');
  const q     = input.value.trim();
  if (!q) return;

  input.value = '';
  document.getElementById('gwSend').disabled    = true;
  document.getElementById('gwSuggestions').innerHTML = '';

  addMsg('user', q);
  const loadingMsg = addMsg('loading', '🤖 بفكر...');

  guideHistory.push({ role: 'user', text: q });

  try {
    const result = await searchGuide(q);
    loadingMsg.remove();

    if (result.found) {
      addMsg('bot', result.answer);
      if (result.suggestions && result.suggestions.length) {
        showSuggestions(result.suggestions);
      }
      guideHistory.push({ role: 'bot', text: result.answer });
    } else {
      // Not found — suggest Gemini
      addMsg('bot', result.fallback || 'مش فاهم السؤال ده كويس 🤔 جرب تسأله بطريقة تانية، أو استخدم Gemini وهو هيعرف يساعدك أكتر.');
      showSuggestions(['إيه الأنشطة المجانية؟', 'ازاي أشتري تذاكر؟', 'إيه هو الـ SSR؟']);
      document.getElementById('geminiLink').style.background = 'rgba(167,139,250,0.25)';
      setTimeout(() => document.getElementById('geminiLink').style.background = '', 2000);
    }
  } catch(e) {
    loadingMsg.remove();
    addMsg('bot', 'فيه مشكلة في الاتصال 😕 جرب تاني أو استخدم Gemini.');
  }

  document.getElementById('gwSend').disabled = false;
}

// ── Search Guide Sheet ────────────────────────────────────
async function searchGuide(question) {
  // Fallback: local knowledge base if sheet not configured
  if (!GUIDE_SHEET_URL || GUIDE_SHEET_URL === 'YOUR_GUIDE_APPS_SCRIPT_URL') {
    return searchLocalKB(question);
  }

  try {
    const body = JSON.stringify({ action: 'search_guide', question, student_name: studentName });
    const url  = GUIDE_SHEET_URL + '?data=' + encodeURIComponent(body);
    const res  = await fetch(url, { method: 'GET', redirect: 'follow' });
    const text = await res.text();
    const s = text.indexOf('{'), e = text.lastIndexOf('}');
    if (s === -1) throw new Error('Bad response');
    return JSON.parse(text.slice(s, e + 1));
  } catch(err) {
    return searchLocalKB(question);
  }
}

// ── Local Knowledge Base (fallback) ──────────────────────
const LOCAL_KB = [
  { keywords: ['توكن','توكينز','كسب','اكسب','كيف اكسب'],
    answer: 'التوكينز بتكسبها بإكمال التاسكات في أي نشاط. كل إجابة صح = توكينز. الأنشطة الصعبة زي Dictation X وSeeds X بتديك توكينز أكتر (90-100 توكن لكل تاسك).',
    suggestions: ['التذاكر الذهبية إيه؟', 'الأنشطة الأصعب إيه؟'] },

  { keywords: ['تذكرة','تذاكر','ذهبية','golden ticket'],
    answer: 'التذاكر الذهبية بتكسبها لما توصل لـ milestones معينة. كل 3,000 توكن = تذكرة واحدة. تقدر تصرف 3 تذاكر عشان تفتح كل الأنشطة الـ premium للموسم كله.',
    suggestions: ['الاشتراك بكام؟', 'ازاي اشتري تذاكر؟'] },

  { keywords: ['اشتراك','اشترك','فلوس','سعر','بكام'],
    answer: 'الاشتراك في الموسم بيكلف 3 تذاكر ذهبية. لو مش عندك تذاكر كفاية، تقدر تشتريها بفودافون كاش من صفحة الشوب. السعر 40 جنيه لـ 3 تذاكر.',
    suggestions: ['ازاي اشتري من الشوب؟', 'إيه المجاني؟'] },

  { keywords: ['مجاني','مجانا','بدون فلوس','free'],
    answer: 'الأنشطة المجانية: Grammar, Alike, Label, Golden Ear, Figurative, Sing Sang Sung. وكمان التاسك الأول في Seeds و Vivid و Dictation و El-Magazine مجاني. وعندك 14 يوم تجربة مجانية بعد التسجيل.',
    suggestions: ['الاشتراك إيه؟', 'التجربة المجانية كام يوم؟'] },

  { keywords: ['تجربة','trial','14 يوم'],
    answer: 'بعد التسجيل هتلاقي 14 يوم تجربة مجانية — كل الأنشطة متاحة. التوكينز بتتضاف عادي. بعد انتهاء التجربة بترجع للـ plan المجاني أو تشترك.',
    suggestions: ['إزاي أشترك؟', 'إيه الأنشطة المجانية؟'] },

  { keywords: ['نشاط','انشطة','الأنشطة','ايه في'],
    answer: 'فيه 20 نشاط! منهم 10 عاديين و 10 نسخة X للمتقدمين:\n📝 Grammar — 🌱 Seeds — 🖼️ Vivid — 👂 Alike — 🏷️ Label — 👂 Golden Ear — 💬 Figurative — 🎵 Sing Sang Sung — ✍️ Dictation — 🎙️ El-Magazine\nوكلهم موجود بنسخة X بتوكينز أعلى.',
    suggestions: ['إيه الأنشطة المجانية؟', 'الـ X version إيه؟'] },

  { keywords: ['ترتيب','ليدربورد','تصدر','مرتبة','رانك'],
    answer: 'الترتيب بيتحسب على أساس التوكينز. فيه ترتيبين — ترتيب الموسم (بيتريسيت كل موسم) وترتيب الكل وقت (مش بيتريسيت). اعمل أكبر عدد ممكن من التاسكات عشان ترفع في الترتيب.',
    suggestions: ['إزاي أكسب توكينز أكتر؟', 'الموسم امتى بينتهي؟'] },

  { keywords: ['ssr','تقرير','تصحيح','تفاصيل'],
    answer: 'SSR Reporter خدمة بتوضحلك كل إجابة أعطيتها والإجابة الصح، ولماذا كانت غلط. بتكلف تذكرة واحدة وصالحة للموسم كله.',
    suggestions: ['إزاي أشتري تذكرة؟'] },

  { keywords: ['ديكتيشن','dictation','كتابة يدوية','صورة'],
    answer: 'في Dictation بتسمع الـ audio وتكتب اللي سمعته بخطك على ورق، بعدين تصور الورقة وترفعها. الدرجة بتيجي في الـ inbox بعد المراجعة. لازم الصورة تكون واضحة والخط واضح.',
    suggestions: ['الـ DictationX إيه؟', 'الدرجة امتى بتيجي؟'] },

  { keywords: ['نتيجة','درجة','score','امتى'],
    answer: 'أغلب الأنشطة نتيجتها فورية. لكن Dictation, El-Magazine, Sing Sang Sung النتيجة بتيجي في الـ Inbox بعد مراجعة الأدمن. شيل Inbox بتاعك كل يوم.',
    suggestions: ['إزاي أشوف الـ Inbox؟'] },

  { keywords: ['inbox','رسائل','بريد','اشعار'],
    answer: 'الـ Inbox في الداشبورد. هتلاقي فيه نتايج التاسكات، تحذيرات، رد على الطعون، وكل الإشعارات. بيبان عليه رقم لو فيه رسائل جديدة.',
    suggestions: ['إزاي أعمل طعن؟'] },

  { keywords: ['ai','ذكاء اصطناعي','chatgpt','copy'],
    answer: 'ممنوع استخدام AI في أنشطة الكتابة (Seeds, Vivid, Dictation, Sing Sang Sung). النظام بيكتشفه تلقائياً. أول تحذير = صفر توكن. 3 تحذيرات = إيقاف الحساب.',
    suggestions: ['إيه الأنشطة اللي فيها كتابة؟'] },

  { keywords: ['طعن','appeal','غلط','مش صح'],
    answer: 'لو حاسس الدرجة غلط، دوس على زرار Appeal بعد النتيجة. اكتب سبب الطعن والأدمن هيراجعه خلال 24 ساعة. لو الطعن اتقبل هيتضاف توكينز.',
    suggestions: ['النتيجة امتى بتيجي؟'] },

  { keywords: ['فودافون','vodafone','دفع','كاش','شراء'],
    answer: 'الدفع عن طريق Vodafone Cash. ادخل صفحة الشوب، اختار الباقة، وابعت المبلغ على رقم الفودافون المكتوب. بعدين صوّر الإيصال وابعته على الواتساب مع الكود بتاعك. التذاكر بتتضاف في 30 دقيقة.',
    suggestions: ['رقم الفودافون إيه؟'] },
];

function searchLocalKB(question) {
  const q = question.toLowerCase();
  let bestMatch = null;
  let bestScore = 0;

  LOCAL_KB.forEach(entry => {
    let score = 0;
    entry.keywords.forEach(kw => {
      if (q.includes(kw.toLowerCase())) score += 2;
      else if (kw.toLowerCase().split('').some(c => q.includes(c))) score += 0.5;
    });
    if (score > bestScore) { bestScore = score; bestMatch = entry; }
  });

  if (bestMatch && bestScore >= 2) {
    return {
      found: true,
      answer: bestMatch.answer,
      suggestions: bestMatch.suggestions || []
    };
  }

  // Partial match
  if (bestMatch && bestScore >= 1) {
    return {
      found: true,
      answer: `مش متأكد 100% بس ممكن تقصد: ${bestMatch.answer}`,
      suggestions: ['اسألني بطريقة تانية', ...( bestMatch.suggestions || [])]
    };
  }

  return {
    found: false,
    fallback: `مش فاهم السؤال ده كويس 🤔 جرب تسأل عن: التوكينز، الأنشطة، الاشتراك، الترتيب، أو استخدم Gemini للمساعدة الكاملة.`
  };
}
</script>
