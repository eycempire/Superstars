<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>El-Magazine Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#FFD700; --gold2:#FFA500; --dark:#0F0F1A; --dark2:#181825; --dark3:#222235;
  --border:rgba(255,215,0,0.12); --border2:rgba(255,255,255,0.07);
  --text:#EEEEF5; --muted:#7777AA; --muted2:#AAAACC; --success:#10B981; --error:#EF4444;
  --font-b:'Syne',sans-serif; --font-mono:'JetBrains Mono',monospace; --radius:14px;
}
body { font-family:var(--font-b); background:var(--dark); color:var(--text); padding:16px 14px 32px; }

.header { margin-bottom:16px; }
.h-badge { display:inline-flex; align-items:center; gap:7px; background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2); border-radius:100px; padding:4px 12px; font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:#6EE7B7; margin-bottom:10px; }
.h-title { font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }

.text-card {
  background:var(--dark2); border:1px solid var(--border2);
  border-radius:var(--radius); padding:20px; margin-bottom:18px;
}
.text-label { font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.passage {
  font-size:15px; line-height:1.9; color:var(--text);
  font-weight:500;
}

.steps { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.step { display:flex; align-items:flex-start; gap:12px; background:var(--dark2); border:1px solid var(--border2); border-radius:var(--radius); padding:14px; transition:border-color .2s; }
.step.done { border-color:rgba(16,185,129,0.25); }
.step-num { width:28px; height:28px; border-radius:50%; background:var(--dark3); border:1.5px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:var(--muted); flex-shrink:0; transition:all .2s; }
.step.done .step-num { background:rgba(16,185,129,0.1); border-color:rgba(16,185,129,0.3); color:#6EE7B7; }
.step-body { flex:1; }
.step-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:3px; }
.step-desc  { font-size:12px; color:var(--muted); line-height:1.5; }

/* Recorder */
.recorder-wrap { background:var(--dark2); border:1px solid var(--border2); border-radius:var(--radius); padding:20px; text-align:center; margin-bottom:16px; }
.rec-status { font-size:12px; color:var(--muted); margin-bottom:14px; }
.rec-timer {
  font-family:var(--font-mono); font-size:32px; font-weight:700;
  color:var(--gold); margin-bottom:14px; display:none;
}
.rec-btn {
  width:72px; height:72px; border-radius:50%;
  border:none; cursor:pointer; font-size:28px;
  transition:all .2s; margin:0 auto; display:flex;
  align-items:center; justify-content:center;
}
.rec-btn.idle    { background:rgba(239,68,68,0.15); border:2px solid rgba(239,68,68,0.3); color:#FCA5A5; }
.rec-btn.idle:hover { background:rgba(239,68,68,0.25); }
.rec-btn.recording { background:var(--error); border:2px solid #FCA5A5; animation:rec-pulse 1s ease-in-out infinite; color:#fff; }
@keyframes rec-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 14px rgba(239,68,68,0)} }
.rec-btn.done    { background:rgba(16,185,129,0.15); border:2px solid rgba(16,185,129,0.3); color:#6EE7B7; }
.rec-hint { font-size:11px; color:var(--muted); margin-top:10px; }

/* OR divider */
.or-divider { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:11px; margin:14px 0; }
.or-divider::before,.or-divider::after { content:''; flex:1; height:1px; background:var(--border2); }

/* Upload */
.upload-area {
  background:var(--dark2); border:2px dashed var(--border2);
  border-radius:var(--radius); padding:20px;
  text-align:center; cursor:pointer; transition:all .2s;
}
.upload-area:hover { border-color:rgba(255,215,0,0.25); background:rgba(255,215,0,0.02); }
.upload-area.has-file { border-color:rgba(16,185,129,0.3); border-style:solid; background:rgba(16,185,129,0.04); }
.upload-input { display:none; }
.upload-icon { font-size:28px; margin-bottom:8px; display:block; }
.upload-text { font-size:13px; color:var(--muted2); }
.upload-sub  { font-size:11px; color:var(--muted); margin-top:4px; }

.pending-note { background:rgba(59,130,246,0.07); border:1px solid rgba(59,130,246,0.18); border-radius:var(--radius); padding:12px 14px; font-size:12px; color:#93C5FD; margin-top:12px; }

.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,215,0,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading passage...</div></div></div>
<script src="../config.js"></script>
<script>
const params     = new URLSearchParams(window.location.search);
const taskNumber = parseInt(params.get('task')) || 1;
const studentId  = params.get('student') || '';

let taskData      = null;
let mediaRecorder = null;
let audioChunks   = [];
let audioBlob     = null;
let audioB64      = null;
let isRecording   = false;
let recTimer      = null;
let recSeconds    = 0;
let step1Done     = false;

window.addEventListener('DOMContentLoaded', async () => {
  const r = await api('get_task_data', { student_id:studentId, activity_name:'ElMagazine', task_number:taskNumber });
  if (!r.success || !r.task) { showError('Could not load task.'); return; }
  taskData = r.task;
  render();
});

function render() {
  document.getElementById('root').innerHTML = `
    <div class="header">
      <div class="h-badge">🎙️ El-Magazine · Task ${taskNumber}</div>
    </div>

    <!-- Text passage -->
    <div class="text-card">
      <div class="text-label">Read this passage aloud</div>
      <div class="passage">${taskData.Text_Content || 'Text passage will appear here.'}</div>
    </div>

    <!-- Steps -->
    <div class="steps">
      <div class="step ${step1Done?'done':''}">
        <div class="step-num">${step1Done?'✓':'1'}</div>
        <div class="step-body"><div class="step-title">Read & Prepare</div><div class="step-desc">Read the passage above carefully before recording.</div></div>
      </div>
      <div class="step ${audioB64?'done':''}">
        <div class="step-num">${audioB64?'✓':'2'}</div>
        <div class="step-body"><div class="step-title">Record your voice</div><div class="step-desc">Speak clearly and confidently. Read naturally — not too fast, not too slow.</div></div>
      </div>
    </div>

    <!-- Recorder -->
    <div class="recorder-wrap">
      <div class="rec-status" id="recStatus">${audioB64?'✅ Recording ready!':'Press the button to start recording'}</div>
      <div class="rec-timer" id="recTimer" style="${isRecording?'display:block':'display:none'}">0:00</div>
      <button class="rec-btn ${audioB64?'done':isRecording?'recording':'idle'}" id="recBtn" onclick="toggleRecording()">
        ${audioB64?'✅':isRecording?'⏹':'🎙️'}
      </button>
      <div class="rec-hint">${audioB64?'Tap to re-record if needed':isRecording?'Tap again to stop recording':'Tap to start'}</div>
    </div>

    <!-- OR upload -->
    <div class="or-divider">or upload an audio file</div>
    <div class="upload-area ${audioB64?'has-file':''}" onclick="document.getElementById('audioFile').click()">
      <input type="file" id="audioFile" class="upload-input" accept="audio/*" onchange="handleUpload(this)">
      <span class="upload-icon">${audioB64?'✅':'📁'}</span>
      <div class="upload-text">${audioB64?'Audio ready! Tap to replace.':'Upload audio file'}</div>
      <div class="upload-sub">MP3, WAV, M4A, OGG — up to 20MB</div>
    </div>

    <div class="pending-note">📬 Your recording will be reviewed by our team. Your score will be sent to your Inbox.</div>
  `;

  if (!step1Done) {
    setTimeout(() => { step1Done = true; render(); }, 3000);
  }
}

async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks  = [];
    mediaRecorder= new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = e => { audioB64 = e.target.result; render(); };
      reader.readAsDataURL(audioBlob);
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    isRecording = true;
    recSeconds  = 0;
    render();

    recTimer = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds/60);
      const s = recSeconds%60;
      const el = document.getElementById('recTimer');
      if (el) el.textContent = `${m}:${s<10?'0'+s:s}`;
    }, 1000);
  } catch(e) {
    alert('Microphone access denied. Please allow microphone access or upload an audio file instead.');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    clearInterval(recTimer);
    isRecording = false;
  }
}

function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 20 * 1024 * 1024) { alert('File too large. Maximum 20MB.'); return; }
  const reader = new FileReader();
  reader.onload = e => { audioB64 = e.target.result; render(); };
  reader.readAsDataURL(file);
}

window.getSubmitPayload = function() {
  if (!audioB64) throw new Error('Please record or upload your audio first.');
  return { audio_drive_url: audioB64, task_number: taskNumber };
};

window.getAnswers = function() { return window.getSubmitPayload(); };

function showError(msg) {
  document.getElementById('root').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;
}
</script>
</body>
</html>
