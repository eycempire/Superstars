<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"><title>Figurative X</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="../config.js"></script>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--gold:#FFD700;--purple:#A855F7;--dark:#0F0F1A;--dark2:#181825;--dark3:#222235;--border2:rgba(255,255,255,0.07);--text:#EEEEF5;--muted:#7777AA;--muted2:#AAAACC;--success:#10B981;--error:#EF4444;--font-b:'Syne',sans-serif;--radius:14px}body{font-family:var(--font-b);background:var(--dark);color:var(--text);padding:16px 14px 32px}.x-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);border-radius:100px;padding:5px 14px;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#D8B4FE;margin-bottom:14px}.warn-box{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:10px 14px;font-size:12px;color:#FCD34D;margin-bottom:14px}.q-card{background:var(--dark2);border:1.5px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:12px}.q-num{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}.audio-row{display:flex;align-items:center;gap:10px;background:var(--dark3);border-radius:10px;padding:10px 12px;margin-bottom:12px}.audio-row audio{flex:1;height:36px;outline:none;accent-color:var(--purple)}.once-label{font-size:10px;color:var(--muted);white-space:nowrap}.q-prompt{font-size:12px;color:var(--muted2);margin-bottom:10px;font-style:italic}.choices{display:grid;grid-template-columns:1fr 1fr;gap:7px}.choice-btn{padding:10px 12px;background:var(--dark3);border:1.5px solid var(--border2);border-radius:8px;font-family:var(--font-b);font-size:12px;font-weight:600;color:var(--muted2);cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:6px}.choice-btn:hover:not(.answered){border-color:rgba(168,85,247,0.35);color:var(--text)}.choice-btn.selected{border-color:var(--purple);background:rgba(168,85,247,0.08);color:#D8B4FE}.choice-btn.correct{border-color:var(--success);background:rgba(16,185,129,0.08);color:#6EE7B7}.choice-btn.wrong{border-color:var(--error);background:rgba(239,68,68,0.08);color:#FCA5A5}.choice-btn.dim{opacity:.4;pointer-events:none}.cl{width:18px;height:18px;border-radius:50%;background:var(--dark2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0}.choice-btn.correct .cl{background:var(--success);color:#fff}.choice-btn.wrong .cl{background:var(--error);color:#fff}.choice-btn.selected .cl{background:var(--purple);color:#fff}.q-result{margin-top:8px;font-size:11px;font-weight:700;display:none}.q-result.show{display:flex;align-items:center;gap:5px}.q-result.ok{color:#6EE7B7}.q-result.bad{color:#FCA5A5}.progress-dots{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}.pdot{width:8px;height:8px;border-radius:50%;background:var(--dark3);border:1px solid var(--border2);transition:all .3s}.pdot.ok{background:var(--success);border-color:var(--success)}.pdot.bad{background:var(--error);border-color:var(--error)}.pdot.active{background:var(--purple);border-color:var(--purple);box-shadow:0 0 6px var(--purple)}.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px}.spinner{width:36px;height:36px;border:3px solid rgba(168,85,247,0.2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-text{font-size:13px;color:var(--muted)}</style></head>
<body><div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading audio dialogues...</div></div></div>
<script>
const params=new URLSearchParams(window.location.search);
const taskNumber=parseInt(params.get('task'))||1;
const studentId=params.get('student')||'';
let taskData=null,questions=[],answers=[],answered=[];
const LETTERS=['A','B','C','D'];
window.addEventListener('DOMContentLoaded',async()=>{
  const r=await api('get_task_data',{student_id:studentId,activity_name:'FigurativeX',task_number:taskNumber});
  if(!r.success||!r.task){showError('Could not load task.');return;}
  taskData=r.task;buildQuestions();render();
});
function buildQuestions(){
  for(let i=1;i<=10;i++){
    const correct=taskData['Audio_'+i+'_Answer']||'';
    const audioPath=taskData['Audio_'+i+'_Path']||'';
    if(!correct)continue;
    questions.push({audioPath,correct,choices:shuffle([{text:correct,correct:true},{text:taskData[`Q${i}_Wrong_A`]||'Option B',correct:false},{text:taskData[`Q${i}_Wrong_B`]||'Option C',correct:false},{text:taskData[`Q${i}_Wrong_C`]||'Option D',correct:false}])});
  }
  answers=new Array(questions.length).fill(null);
  answered=new Array(questions.length).fill(false);
}
function shuffle(arr){return arr.map(v=>({v,s:Math.random()})).sort((a,b)=>a.s-b.s).map(({v})=>v);}
function countDone(){return answered.filter(Boolean).length;}
function render(){
  document.getElementById('root').innerHTML=`
    <div class="x-badge">✨ Figurative X · Task ${taskNumber}</div>
    <div class="warn-box">⚠️ Each audio plays ONCE only — no pause, rewind, or replay.</div>
    <div class="progress-dots">${questions.map((_,i)=>{let cls='';if(answered[i])cls=answers[i]!==null&&questions[i].choices[answers[i]]?.correct?'ok':'bad';else if(i===countDone())cls='active';return`<div class="pdot ${cls}"></div>`;}).join('')}</div>
    ${questions.map((q,i)=>renderQ(q,i)).join('')}`;
}
function renderQ(q,i){
  const isDone=answered[i],sel=answers[i],isOk=sel!==null&&q.choices[sel]?.correct;
  return`<div class="q-card" id="qc-${i}">
    <div class="q-num">Dialogue ${i+1} of ${questions.length}</div>
    <div class="audio-row">
      ${q.audioPath?`<audio id="aud-${i}" src="${q.audioPath}" onended="markPlayed(${i})" onplay="restrictPlay(${i})"><source></audio><button onclick="playAudio(${i})" style="background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);border-radius:8px;padding:7px 14px;color:#D8B4FE;font-family:var(--font-b);font-size:12px;font-weight:700;cursor:pointer;" id="playbtn-${i}">▶ Play</button>`:'<span style="color:var(--muted);font-size:12px">Audio unavailable</span>'}
      <span class="once-label">Once only</span>
    </div>
    <div class="q-prompt">What does the figurative expression mean?</div>
    <div class="choices">
      ${q.choices.map((c,ci)=>{let cls='';if(isDone){if(c.correct)cls='correct answered';else if(ci===sel)cls='wrong answered';else cls='dim answered';}else if(ci===sel)cls='selected';
      return`<button class="choice-btn ${cls}" onclick="pick(${i},${ci})" ${isDone?'disabled':''}><div class="cl">${LETTERS[ci]}</div>${c.text}</button>`;}).join('')}
    </div>
    <div class="q-result ${isDone?'show':''} ${isDone?(isOk?'ok':'bad'):''}">
      ${isDone?(isOk?'✅ Correct!':`❌ Answer: "${q.choices.find(c=>c.correct)?.text||''}"`):''}
    </div>
  </div>`;
}
const played=new Set();
function playAudio(i){
  if(played.has(i))return;
  played.add(i);
  const aud=document.getElementById('aud-'+i);
  const btn=document.getElementById('playbtn-'+i);
  if(aud){aud.play();if(btn){btn.textContent='🔊 Playing...';btn.disabled=true;btn.style.opacity='.5';}}
}
function restrictPlay(i){
  if(played.size>1){const aud=document.getElementById('aud-'+i);if(aud&&!played.has(i))aud.pause();}
}
function markPlayed(i){const btn=document.getElementById('playbtn-'+i);if(btn){btn.textContent='✅ Played';btn.disabled=true;btn.style.opacity='.4';}}
function pick(qIdx,ci){
  if(answered[qIdx])return;
  answers[qIdx]=ci;answered[qIdx]=true;render();
  const next=answered.findIndex(a=>!a);
  if(next>-1)setTimeout(()=>document.getElementById('qc-'+next)?.scrollIntoView({behavior:'smooth',block:'start'}),350);
}
window.getAnswers=function(){return questions.map((q,i)=>answered[i]&&answers[i]!==null?q.choices[answers[i]].text:'');};
function showError(msg){document.getElementById('root').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;}
</script></body></html>
