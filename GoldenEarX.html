<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"><title>Golden Ear X</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="../config.js"></script>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--gold:#FFD700;--purple:#A855F7;--dark:#0F0F1A;--dark2:#181825;--dark3:#222235;--border2:rgba(255,255,255,0.07);--text:#EEEEF5;--muted:#7777AA;--muted2:#AAAACC;--success:#10B981;--error:#EF4444;--font-b:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:14px}body{font-family:var(--font-b);background:var(--dark);color:var(--text);padding:16px 14px 32px}.x-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);border-radius:100px;padding:5px 14px;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#D8B4FE;margin-bottom:14px}.warn-box{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:10px 14px;font-size:12px;color:#FCD34D;margin-bottom:14px}.clip-card{background:var(--dark2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:18px;margin-bottom:14px;transition:border-color .2s}.clip-card.played{border-color:rgba(168,85,247,0.2)}.clip-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.clip-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}.clip-badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:100px;background:rgba(168,85,247,0.1);color:#D8B4FE;border:1px solid rgba(168,85,247,0.2)}.clip-badge.done{background:rgba(16,185,129,0.1);color:#6EE7B7;border-color:rgba(16,185,129,0.2)}.play-btn{width:100%;padding:11px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);border-radius:10px;color:#D8B4FE;font-family:var(--font-b);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}.play-btn:hover:not(:disabled){background:rgba(168,85,247,0.18)}.play-btn:disabled{opacity:.4;cursor:not-allowed}.play-btn.playing{background:rgba(168,85,247,0.2);animation:pulse .8s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}.play-btn.done-btn{background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.2);color:#6EE7B7}.sentences-label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}.sentence-inputs{display:flex;flex-direction:column;gap:7px}.s-row{display:flex;align-items:center;gap:8px}.s-num{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:16px;flex-shrink:0;text-align:center}.s-input{flex:1;background:var(--dark3);border:1.5px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--font-b);font-size:12px;outline:none;transition:border-color .2s;caret-color:var(--purple)}.s-input:focus{border-color:rgba(168,85,247,0.4)}.s-input::placeholder{color:var(--muted)}.s-input:disabled{opacity:.5;cursor:not-allowed}.clip-note{font-size:11px;color:var(--muted);margin-top:8px;font-style:italic}.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px}.spinner{width:36px;height:36px;border:3px solid rgba(168,85,247,0.2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-text{font-size:13px;color:var(--muted)}</style></head>
<body><div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading audio task...</div></div></div>
<script>
const params=new URLSearchParams(window.location.search);
const taskNumber=parseInt(params.get('task'))||1;
const studentId=params.get('student')||'';
let taskData=null;
const CLIPS=4;
const played=new Set();
const playing=new Set();
window.addEventListener('DOMContentLoaded',async()=>{
  const r=await api('get_task_data',{student_id:studentId,activity_name:'GoldenEarX',task_number:taskNumber});
  if(!r.success||!r.task){showError('Could not load task.');return;}
  taskData=r.task;render();
});
function render(){
  document.getElementById('root').innerHTML=`
    <div class="x-badge">✨ Golden Ear X · Task ${taskNumber}</div>
    <div class="warn-box">⚠️ Each clip plays ONCE only — no pause, rewind, or replay. Listen carefully, then summarize in 3 sentences.</div>
    ${Array.from({length:CLIPS},(_,i)=>renderClip(i)).join('')}`;
}
function renderClip(i){
  const idx=i+1;
  const audioPath=taskData[`Audio_${idx}_Path`]||'';
  const isDone=played.has(i);
  const isPlaying=playing.has(i);
  return`<div class="clip-card ${isDone?'played':''}" id="clip-${i}">
    <div class="clip-header">
      <div class="clip-title">Clip ${idx} of ${CLIPS}</div>
      <div class="clip-badge ${isDone?'done':''}">${isDone?'✓ Played':'Not played'}</div>
    </div>
    <button class="play-btn ${isDone?'done-btn':isPlaying?'playing':''}" id="playbtn-${i}"
      onclick="playClip(${i},'${audioPath}')"
      ${isDone||isPlaying?'disabled':''}>
      ${isDone?'✅ Clip Played':isPlaying?'🔊 Playing...':'▶ Play Clip '+idx+' (once only)'}
    </button>
    <div class="sentences-label">Write 3 summary sentences:</div>
    <div class="sentence-inputs">
      ${[1,2,3].map(j=>`<div class="s-row">
        <span class="s-num">${j}</span>
        <input type="text" class="s-input" id="s-${i}-${j}"
          placeholder="Sentence ${j}..." maxlength="200"
          ${!isDone?'disabled':''}>
      </div>`).join('')}
    </div>
    <div class="clip-note">${isDone?'Write your 3 sentences above.':'Play the clip first to unlock the input boxes.'}</div>
  </div>`;
}
function playClip(i,audioPath){
  if(played.has(i)||playing.has(i))return;
  playing.add(i);
  const btn=document.getElementById('playbtn-'+i);
  if(btn){btn.textContent='🔊 Playing...';btn.disabled=true;btn.className='play-btn playing';}
  if(audioPath){
    const audio=new Audio(audioPath);
    audio.onended=()=>finishClip(i);
    audio.onerror=()=>finishClip(i);
    audio.play().catch(()=>finishClip(i));
  } else {
    // Simulate for dev
    setTimeout(()=>finishClip(i),2000);
  }
}
function finishClip(i){
  playing.delete(i);
  played.add(i);
  // Re-render just this clip
  const clip=document.getElementById('clip-'+i);
  if(clip){clip.outerHTML=renderClip(i);}
  else render();
}
window.getAnswers=function(){
  const result=[];
  for(let i=0;i<CLIPS;i++){
    const sentences=[];
    for(let j=1;j<=3;j++){
      sentences.push(document.getElementById(`s-${i}-${j}`)?.value?.trim()||'');
    }
    result.push({clip:i+1,sentences});
  }
  return result;
};
function showError(msg){document.getElementById('root').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;}
</script></body></html>
