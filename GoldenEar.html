<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Golden Ear Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#FFD700; --gold2:#FFA500; --dark:#0F0F1A; --dark2:#181825; --dark3:#222235;
  --border:rgba(255,215,0,0.12); --border2:rgba(255,255,255,0.07);
  --text:#EEEEF5; --muted:#7777AA; --muted2:#AAAACC; --success:#10B981; --error:#EF4444;
  --font-b:'Syne',sans-serif; --font-mono:'JetBrains Mono',monospace; --radius:14px;
}
body { font-family:var(--font-b); background:var(--dark); color:var(--text); padding:16px 14px 32px; }

/* Audio Player */
.audio-card {
  background:var(--dark2); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px;
  margin-bottom:20px; text-align:center;
  position:relative; overflow:hidden;
}
.audio-card::before { content:''; position:absolute; top:0; left:10%; right:10%; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.audio-icon { font-size:48px; margin-bottom:12px; display:block; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
.audio-label { font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.audio-player {
  width:100%; height:44px; border-radius:22px; outline:none;
  accent-color:var(--gold);
}
.audio-note { font-size:11px; color:var(--muted); margin-top:10px; }

/* Q header */
.q-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.q-title { font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.q-score { font-family:var(--font-mono); font-size:13px; color:var(--gold); }

/* Progress dots */
.progress-dots { display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap; }
.pdot { width:8px; height:8px; border-radius:50%; background:var(--dark3); border:1px solid var(--border2); transition:all .3s; }
.pdot.done-ok  { background:var(--success); border-color:var(--success); }
.pdot.done-bad { background:var(--error);   border-color:var(--error); }
.pdot.active   { background:var(--gold);    border-color:var(--gold); box-shadow:0 0 6px var(--gold); }

/* Question card */
.q-card { background:var(--dark2); border:1.5px solid var(--border2); border-radius:var(--radius); padding:18px; margin-bottom:12px; animation:si .3s ease; }
@keyframes si { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.q-num   { font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.q-text  { font-size:14px; color:var(--text); line-height:1.6; margin-bottom:14px; }
.choices { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.choice-btn {
  padding:10px 12px; background:var(--dark3); border:1.5px solid var(--border2);
  border-radius:8px; font-family:var(--font-b); font-size:12px; font-weight:600;
  color:var(--muted2); cursor:pointer; transition:all .2s; text-align:left;
  display:flex; align-items:center; gap:7px;
}
.choice-btn:hover:not(.answered) { border-color:rgba(255,215,0,0.3); color:var(--text); }
.choice-btn.selected { border-color:var(--gold); background:rgba(255,215,0,0.07); color:var(--gold); }
.choice-btn.correct  { border-color:var(--success); background:rgba(16,185,129,0.08); color:#6EE7B7; }
.choice-btn.wrong    { border-color:var(--error);   background:rgba(239,68,68,0.08); color:#FCA5A5; }
.choice-btn.dim { opacity:.4; pointer-events:none; }
.cl { width:20px; height:20px; border-radius:50%; background:var(--dark2); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; flex-shrink:0; transition:background .2s; }
.choice-btn.correct .cl { background:var(--success); color:#fff; }
.choice-btn.wrong   .cl { background:var(--error);   color:#fff; }
.choice-btn.selected .cl { background:var(--gold); color:var(--dark); }

.q-result { margin-top:8px; font-size:11px; font-weight:700; display:none; }
.q-result.show { display:flex; align-items:center; gap:5px; }
.q-result.ok  { color:#6EE7B7; } .q-result.bad { color:#FCA5A5; }

.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,215,0,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:13px; color:var(--muted); }

@media (max-width:380px) { .choices { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading audio task...</div></div></div>
<script src="../config.js"></script>
<script>
const params     = new URLSearchParams(window.location.search);
const taskNumber = parseInt(params.get('task')) || 1;
const studentId  = params.get('student') || '';

let taskData  = null;
let questions = [];
let answers   = [];
let answered  = [];
const LETTERS = ['A','B','C','D'];

window.addEventListener('DOMContentLoaded', async () => {
  const result = await api('get_task_data', {
    student_id: studentId, activity_name: 'GoldenEar', task_number: taskNumber
  });
  if (!result.success || !result.task) { showError('Could not load task.'); return; }
  taskData = result.task;
  buildQuestions();
  render();
});

function buildQuestions() {
  for (let i = 1; i <= 10; i++) {
    const q = taskData['Question_' + i] || '';
    const correct = taskData['Q' + i] || '';
    if (!correct) continue;
    questions.push({
      text: q || `Question ${i}`,
      choices: shuffleChoices([
        { text: correct, correct: true },
        { text: taskData[`Q${i}_Wrong_A`] || 'Option B', correct: false },
        { text: taskData[`Q${i}_Wrong_B`] || 'Option C', correct: false },
        { text: taskData[`Q${i}_Wrong_C`] || 'Option D', correct: false }
      ])
    });
  }
  answers  = new Array(questions.length).fill(null);
  answered = new Array(questions.length).fill(false);
}

function shuffleChoices(arr) {
  return arr.map(v => ({v,sort:Math.random()})).sort((a,b)=>a.sort-b.sort).map(({v})=>v);
}

function render() {
  const doneCount  = answered.filter(Boolean).length;
  const correct    = countCorrect();
  const tokPerQ    = (CONFIG?.TOKENS?.GoldenEar || 50) / 10;

  document.getElementById('root').innerHTML = `
    <!-- Audio player -->
    <div class="audio-card">
      <span class="audio-icon">👂</span>
      <div class="audio-label">Golden Ear · Task ${taskNumber} · Listen carefully</div>
      ${taskData.Audio_Path
        ? `<audio class="audio-player" controls src="${taskData.Audio_Path}"></audio>`
        : `<div style="color:var(--muted);font-size:13px;">Audio player will appear here</div>`}
      <div class="audio-note">You can play, pause, and replay as many times as needed.</div>
    </div>

    <!-- Questions header -->
    <div class="q-header">
      <div class="q-title">Questions (${doneCount}/${questions.length})</div>
      <div class="q-score">⚡ ${Math.round(correct * tokPerQ)} tokens</div>
    </div>

    <!-- Progress -->
    <div class="progress-dots">
      ${questions.map((q,i) => {
        let cls = '';
        if (answered[i]) cls = answers[i]!==null && questions[i].choices[answers[i]]?.correct ? 'done-ok':'done-bad';
        else if (i === doneCount) cls = 'active';
        return `<div class="pdot ${cls}"></div>`;
      }).join('')}
    </div>

    <!-- Questions -->
    ${questions.map((q,i) => renderQ(q,i)).join('')}
  `;
}

function renderQ(q, i) {
  const isDone   = answered[i];
  const selIdx   = answers[i];
  const isOk     = selIdx !== null && q.choices[selIdx]?.correct;
  return `
    <div class="q-card" id="qc-${i}">
      <div class="q-num">Question ${i+1} of ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="choices">
        ${q.choices.map((c,ci)=>{
          let cls = '';
          if(isDone){ if(c.correct) cls='correct answered'; else if(ci===selIdx) cls='wrong answered'; else cls='dim answered'; }
          else if(ci===selIdx) cls='selected';
          return `<button class="choice-btn ${cls}" onclick="pick(${i},${ci})" ${isDone?'disabled':''}>
            <div class="cl">${LETTERS[ci]}</div>${c.text}
          </button>`;
        }).join('')}
      </div>
      <div class="q-result ${isDone?'show':''} ${isDone?(isOk?'ok':'bad'):''}">
        ${isDone?(isOk?'✅ Correct!':`❌ Correct: "${q.choices.find(c=>c.correct)?.text||''}"`):''}
      </div>
    </div>`;
}

function pick(qIdx, choiceIdx) {
  if (answered[qIdx]) return;
  answers[qIdx]  = choiceIdx;
  answered[qIdx] = true;
  render();
  const allDone = answered.every(Boolean);
  if (!allDone) {
    const next = answered.findIndex(a => !a);
    setTimeout(() => document.getElementById('qc-'+next)?.scrollIntoView({behavior:'smooth',block:'start'}), 350);
  }
}

function countCorrect() {
  return questions.reduce((s,q,i) => s + (answered[i]&&answers[i]!==null&&q.choices[answers[i]]?.correct?1:0), 0);
}

window.getAnswers = function() {
  return questions.map((q,i) => answered[i]&&answers[i]!==null ? q.choices[answers[i]].text : '');
};

function showError(msg) {
  document.getElementById('root').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;
}
</script>
</body>
</html>
