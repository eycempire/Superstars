<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"><title>Vivid X</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="../config.js"></script>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--gold:#FFD700;--purple:#A855F7;--dark:#0F0F1A;--dark2:#181825;--dark3:#222235;--border2:rgba(255,255,255,0.07);--text:#EEEEF5;--muted:#7777AA;--muted2:#AAAACC;--success:#10B981;--font-b:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:14px}body{font-family:var(--font-b);background:var(--dark);color:var(--text);padding:16px 14px 32px}.x-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);border-radius:100px;padding:5px 14px;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#D8B4FE;margin-bottom:14px}.img-wrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border2);margin-bottom:14px;background:var(--dark2)}.task-img{width:100%;max-height:280px;object-fit:cover;display:block}.req-box{background:rgba(168,85,247,0.07);border:1px solid rgba(168,85,247,0.2);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;font-size:13px;font-weight:600;color:#D8B4FE}.instructions{background:var(--dark2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px}.inst-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--muted2);margin-bottom:4px;line-height:1.5}.inst-row:last-child{margin-bottom:0}.wc-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:14px}.wc-track{flex:1;height:4px;background:var(--dark3);border-radius:100px;overflow:hidden}.wc-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--gold),#FFA500);transition:width .3s}.wc-fill.over{background:linear-gradient(90deg,#EF4444,#FCA5A5)}.wc-fill.ready{background:linear-gradient(90deg,var(--success),#6EE7B7)}.wc-label{font-family:var(--font-mono);font-size:12px;color:var(--muted2);white-space:nowrap;min-width:80px;text-align:right}.wc-label.ready{color:var(--success)}.wc-label.over{color:#EF4444}.desc-ta{width:100%;min-height:220px;background:var(--dark2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:16px;color:var(--text);font-family:var(--font-b);font-size:14px;line-height:1.8;resize:vertical;outline:none;transition:border-color .2s;caret-color:var(--purple)}.desc-ta:focus{border-color:rgba(168,85,247,0.4)}.desc-ta::placeholder{color:var(--muted)}.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px}.spinner{width:36px;height:36px;border:3px solid rgba(168,85,247,0.2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-text{font-size:13px;color:var(--muted)}</style></head>
<body><div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading image...</div></div></div>
<script>
const params=new URLSearchParams(window.location.search);
const taskNumber=parseInt(params.get('task'))||1;
const studentId=params.get('student')||'';
let taskData=null,typingStart=null;
const MIN_WORDS=250,MAX_WORDS=350;
window.addEventListener('DOMContentLoaded',async()=>{
  const r=await api('get_task_data',{student_id:studentId,activity_name:'VividX',task_number:taskNumber});
  if(!r.success||!r.task){showError('Could not load task.');return;}
  taskData=r.task;render();typingStart=Date.now();
});
function render(){
  const reqText=taskData.Requirement==='past'?'Write what happened BEFORE this scene.':'Write what will happen AFTER this scene.';
  document.getElementById('root').innerHTML=`
    <div class="x-badge">✨ Vivid X · Task ${taskNumber}</div>
    <div class="img-wrap">${taskData.Image_Path?`<img src="${taskData.Image_Path}" class="task-img" alt="Frozen scene">`:'<div style="height:180px;display:flex;align-items:center;justify-content:center;color:var(--muted)">🖼️ Image loading...</div>'}</div>
    <div class="req-box">📌 ${reqText}</div>
    <div class="instructions">
      <div class="inst-row"><span>✍️</span>Write a narrative based on the frozen scene above.</div>
      <div class="inst-row"><span>📏</span>Min <strong>${MIN_WORDS}</strong> — Max <strong>${MAX_WORDS}</strong> words.</div>
      <div class="inst-row"><span>🚫</span>Do not use AI tools — detected submissions earn 0 tokens.</div>
    </div>
    <div class="wc-bar-wrap"><div class="wc-track"><div class="wc-fill" id="wcFill" style="width:0%"></div></div><div class="wc-label" id="wcLabel">0 / ${MIN_WORDS} min</div></div>
    <textarea class="desc-ta" id="descTa" placeholder="Write your narrative here..." oninput="onType(this)" maxlength="3500"></textarea>`;
}
function onType(ta){
  const words=(ta.value.match(/\b\w+\b/g)||[]).length;
  const pct=Math.min((words/MAX_WORDS)*100,100);
  document.getElementById('wcFill').style.width=pct+'%';
  document.getElementById('wcFill').className='wc-fill'+(words>MAX_WORDS?' over':words>=MIN_WORDS?' ready':'');
  document.getElementById('wcLabel').textContent=words+' words';
  document.getElementById('wcLabel').className='wc-label'+(words>MAX_WORDS?' over':words>=MIN_WORDS?' ready':'');
}
window.getAnswers=function(){
  const text=document.getElementById('descTa')?.value||'';
  const words=(text.match(/\b\w+\b/g)||[]).length;
  if(words<MIN_WORDS)throw new Error(`Too short (${words} words). Minimum is ${MIN_WORDS}.`);
  if(words>MAX_WORDS)throw new Error(`Too long (${words} words). Maximum is ${MAX_WORDS}.`);
  return text;
};
window.getTypingDuration=function(){return typingStart?Date.now()-typingStart:999999;};
function showError(msg){document.getElementById('root').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;}
</script></body></html>
