<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Label Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#FFD700; --gold2:#FFA500; --dark:#0F0F1A; --dark2:#181825; --dark3:#222235;
  --border:rgba(255,215,0,0.12); --border2:rgba(255,255,255,0.07);
  --text:#EEEEF5; --muted:#7777AA; --muted2:#AAAACC; --success:#10B981; --error:#EF4444;
  --font-b:'Syne',sans-serif; --font-mono:'JetBrains Mono',monospace; --radius:14px;
}
body { font-family:var(--font-b); background:var(--dark); color:var(--text); padding:16px 14px 32px; }

.header { margin-bottom:16px; }
.h-title { font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.h-sub   { font-size:12px; color:var(--muted2); }

.images-grid {
  display:grid; grid-template-columns:repeat(2,1fr); gap:12px;
}
.img-card {
  background:var(--dark2); border:1.5px solid var(--border2);
  border-radius:var(--radius); overflow:hidden;
  transition:border-color .2s;
}
.img-card.answered-ok  { border-color:rgba(16,185,129,0.3); }
.img-card.answered-bad { border-color:rgba(239,68,68,0.2); }

.img-box {
  width:100%; height:110px; object-fit:cover; display:block;
  background:var(--dark3);
}
.img-placeholder {
  width:100%; height:110px; display:flex; align-items:center; justify-content:center;
  font-size:36px; background:var(--dark3);
}
.img-num {
  font-size:9px; font-weight:800; letter-spacing:.1em;
  color:var(--muted); padding:6px 10px 2px;
  text-transform:uppercase;
}
.img-input-wrap { padding:6px 10px 10px; }
.img-input {
  width:100%; background:var(--dark3);
  border:1.5px solid var(--border2);
  border-radius:8px; padding:8px 10px;
  color:var(--text); font-family:var(--font-b);
  font-size:13px; font-weight:600;
  outline:none; transition:border-color .2s;
  caret-color:var(--gold);
}
.img-input:focus { border-color:rgba(255,215,0,0.3); }
.img-input::placeholder { color:var(--muted); font-weight:400; }
.img-input:disabled {
  opacity:.7; cursor:not-allowed;
}
.img-feedback {
  font-size:11px; margin-top:5px; font-weight:700; min-height:14px;
}
.fb-ok  { color:#6EE7B7; }
.fb-bad { color:#FCA5A5; }

.progress-info {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:14px; font-size:12px; color:var(--muted);
}
.progress-info strong { color:var(--gold); font-family:var(--font-mono); }

.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,215,0,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading images...</div></div></div>
<script src="../config.js"></script>
<script>
const params     = new URLSearchParams(window.location.search);
const taskNumber = parseInt(params.get('task')) || 1;
const studentId  = params.get('student') || '';
let taskData = null;
const TOTAL  = 10;

window.addEventListener('DOMContentLoaded', async () => {
  const result = await api('get_task_data', {
    student_id: studentId, activity_name: 'Label', task_number: taskNumber
  });
  if (!result.success || !result.task) { showError('Could not load task.'); return; }
  taskData = result.task;
  render();
});

function render() {
  const filled = getFilledCount();
  document.getElementById('root').innerHTML = `
    <div class="header">
      <div class="h-title">Label · Task ${taskNumber}</div>
      <div class="h-sub">Write the English name for each object shown.</div>
    </div>
    <div class="progress-info">
      <span>Answered: <strong id="answeredCount">${filled}</strong> / ${TOTAL}</span>
      <span>⚡ up to ${CONFIG?.TOKENS?.Label || 40} tokens</span>
    </div>
    <div class="images-grid">
      ${Array.from({length:TOTAL},(_,i) => renderImageCard(i+1)).join('')}
    </div>
  `;
}

function renderImageCard(num) {
  const imgPath = taskData[`Image_${num}_Path`] || '';
  const imgEmojis = ['🪑','🍎','🚗','🏠','📱','🌳','🐱','🎸','🌊','⌚'];
  return `
    <div class="img-card" id="card-${num}">
      ${imgPath
        ? `<img src="${imgPath}" class="img-box" alt="Object ${num}" onerror="this.outerHTML='<div class=\\'img-placeholder\\'>${imgEmojis[num-1]||'🖼️'}</div>'">`
        : `<div class="img-placeholder">${imgEmojis[num-1]||'🖼️'}</div>`}
      <div class="img-num">Object ${num}</div>
      <div class="img-input-wrap">
        <input type="text" class="img-input" id="inp-${num}"
          placeholder="Type name here..."
          oninput="updateCount()"
          maxlength="60">
        <div class="img-feedback" id="fb-${num}"></div>
      </div>
    </div>
  `;
}

function updateCount() {
  const filled = getFilledCount();
  const el = document.getElementById('answeredCount');
  if (el) el.textContent = filled;
}

function getFilledCount() {
  let count = 0;
  for (let i = 1; i <= TOTAL; i++) {
    const el = document.getElementById('inp-' + i);
    if (el && el.value.trim()) count++;
  }
  return count;
}

window.getAnswers = function() {
  const answers = [];
  for (let i = 1; i <= TOTAL; i++) {
    const val = document.getElementById('inp-' + i)?.value?.trim() || '';
    answers.push(val);
  }
  return answers;
};

function showError(msg) {
  document.getElementById('root').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">⚠️ ${msg}</div>`;
}
</script>
</body>
</html>
